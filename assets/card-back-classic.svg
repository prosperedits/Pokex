<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 734 1024">
  <!-- Original homage to the standard TCG card back: blue marbled field, central ball.
       No trademarked artwork or wordmarks. Aspect 734:1024 matches card scans. -->
  <defs>
    <clipPath id="card"><rect width="734" height="1024" rx="33" ry="46"/></clipPath>
    <radialGradient id="bg" cx="0.5" cy="0.47" r="0.85">
      <stop offset="0" stop-color="#3179C6"/>
      <stop offset="0.55" stop-color="#2461A8"/>
      <stop offset="1" stop-color="#143A76"/>
    </radialGradient>
    <linearGradient id="ballRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E04A56"/>
      <stop offset="1" stop-color="#B7252F"/>
    </linearGradient>
    <radialGradient id="ballSheen" cx="0.36" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="marble" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.011 0.017" numOctaves="3" seed="11" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.04
                0 0 0 0 0.13
                0 0 0 0 0.33
                0 0 0 0.55 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
    <!-- one comma-shaped swirl petal, reused in rotation around the center -->
    <path id="petal" d="M 367 512
                        C 295 425, 262 295, 352 158
                        C 358 300, 392 402, 462 462 Z"/>
    <clipPath id="ballclip"><circle cx="367" cy="512" r="200"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect width="734" height="1024" fill="url(#bg)"/>
    <rect width="734" height="1024" filter="url(#marble)" opacity="0.5"/>

    <!-- pinwheel of dark swirls -->
    <g fill="#10305F" opacity="0.4">
      <use href="#petal"/>
      <use href="#petal" transform="rotate(60 367 512)"/>
      <use href="#petal" transform="rotate(120 367 512)"/>
      <use href="#petal" transform="rotate(180 367 512)"/>
      <use href="#petal" transform="rotate(240 367 512)"/>
      <use href="#petal" transform="rotate(300 367 512)"/>
    </g>
    <g fill="#5E9BD8" opacity="0.22">
      <use href="#petal" transform="rotate(30 367 512) scale(1.18) translate(-55 -75)"/>
      <use href="#petal" transform="rotate(150 367 512) scale(1.18) translate(-55 -75)"/>
      <use href="#petal" transform="rotate(270 367 512) scale(1.18) translate(-55 -75)"/>
    </g>

    <!-- corner glows -->
    <circle cx="0" cy="0" r="260" fill="#5E9BD8" opacity="0.12"/>
    <circle cx="734" cy="1024" r="260" fill="#5E9BD8" opacity="0.12"/>

    <!-- central ball -->
    <g>
      <circle cx="367" cy="516" r="206" fill="#0D2247" opacity="0.45" transform="translate(0 14)"/>
      <circle cx="367" cy="512" r="200" fill="#EDEDEA"/>
      <path d="M 167 512 A 200 200 0 0 1 567 512 Z" fill="url(#ballRed)"/>
      <rect x="167" y="491" width="400" height="42" fill="#15243E" clip-path="url(#ballclip)"/>
      <circle cx="367" cy="512" r="64" fill="#15243E"/>
      <circle cx="367" cy="512" r="48" fill="#EDEDEA"/>
      <circle cx="367" cy="512" r="28" fill="#C8CDD6"/>
      <circle cx="377" cy="502" r="24" fill="#EDEDEA"/>
      <circle cx="367" cy="512" r="200" fill="url(#ballSheen)"/>
    </g>

    <!-- edge vignette -->
    <rect width="734" height="1024" rx="33" ry="46" fill="none" stroke="#0D2247" stroke-opacity="0.55" stroke-width="26"/>
  </g>
</svg>
