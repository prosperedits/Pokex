<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARDx — Home</title>
<meta name="description" content="CARDx — every chase card, one place.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink-bg:#030a21; --blue:#0054fa; --blue-bright:#3b82ff; --ink:#eaf2ff; --dim:#8fa8c8;
  --accent:#3b82ff; --money:#7bd0ff;
  --font:'DM Sans', system-ui, sans-serif; --font-display:'Anton','DM Sans',sans-serif; --mono:'DM Mono', monospace;
  --cw:clamp(280px, 31vw, 470px); --ch:calc(var(--cw) / 0.717);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{min-height:100%;background:var(--ink-bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ---- mouse-reactive WebGL background (ported from link 2) ---- */
#bg{position:fixed;inset:0;z-index:0}
#bg canvas{display:block;width:100%!important;height:100%!important}
.vign{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(100% 80% at 50% 42%, transparent 40%, rgba(2,6,18,.72) 100%)}

/* ---- top bar (Anton) ---- */
.topbar{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:22px clamp(20px,4vw,54px)}
.topbar::before{content:'';position:absolute;inset:0;height:120px;background:linear-gradient(180deg,rgba(3,8,22,.85),transparent);pointer-events:none}
.brand{position:relative;display:inline-flex;align-items:center;border:2px solid var(--ink);font-family:var(--font-display);
  padding:8px 13px 5px;letter-spacing:.16em;font-size:19px;line-height:1}
.brand .k{color:var(--blue-bright)}
.nav{position:relative;display:flex;gap:clamp(20px,3vw,46px)}
.nav a{color:rgba(234,242,255,.82);text-decoration:none;font-family:var(--font-display);font-size:18px;letter-spacing:.06em;transition:.2s;cursor:pointer}
.nav a:hover,.nav a.on{color:#fff}
.burger{position:relative;display:flex;flex-direction:column;gap:6px;padding:8px;background:none;border:0;cursor:pointer}
.burger span{display:block;width:24px;height:2px;background:var(--ink)}

/* ---- intro (CARDx, ported from link 2's APECHAIN preloader) ---- */
#intro{position:fixed;inset:0;z-index:9999;display:grid;place-items:center;background:var(--blue);overflow:hidden}
#intro.leaving{animation:intro-out .8s cubic-bezier(.76,0,.24,1) forwards}
#intro .word{display:flex;font-family:var(--font-display);color:#fff;line-height:.9;user-select:none;font-size:clamp(64px,13vw,220px)}
#intro .word span{display:inline-block;transform-origin:bottom;animation:intro-letter .7s cubic-bezier(.22,1,.36,1) both}
#intro .word .x{color:#cfe0ff}
@keyframes intro-letter{0%{transform:translateY(120%) scaleY(1.6);opacity:0}60%{transform:translateY(0) scaleY(1);opacity:1}100%{transform:translateY(0) scaleY(1);opacity:1}}
@keyframes intro-out{to{transform:translateY(-100%)}}

/* ---- hero: the big oval wheel ---- */
.hero{position:relative;z-index:10;height:100vh;min-height:640px;display:grid;place-items:center;perspective:1900px;perspective-origin:50% 44%;overflow:hidden}
.tilt{transform-style:preserve-3d;transform:rotateX(11deg);will-change:transform}
.ring{position:relative;width:1px;height:1px;transform-style:preserve-3d}
.card{position:absolute;width:var(--cw);height:var(--ch);left:calc(var(--cw)/-2);top:calc(var(--ch)/-2);transform-style:preserve-3d;cursor:pointer;will-change:transform}
.face{position:absolute;inset:0;border-radius:16px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.front{background:#0a1430 center/cover no-repeat;box-shadow:0 30px 60px -24px rgba(0,0,0,.9)}
.front .edge{position:absolute;inset:0;border-radius:16px;box-shadow:inset 0 0 0 1.5px color-mix(in srgb,var(--accent) 40%,transparent),inset 0 0 26px color-mix(in srgb,var(--accent) 16%,transparent)}
/* plain tinted back — no logo, no theme */
.back{transform:rotateY(180deg);border-radius:16px;
  background:linear-gradient(160deg, color-mix(in srgb,var(--accent) 16%, #0a1530), #060c1c);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}
.card.is-active .front{box-shadow:0 50px 90px -20px rgba(0,0,0,.85),0 0 70px color-mix(in srgb,var(--accent) 45%,transparent)}
.card.is-active .front .edge{box-shadow:inset 0 0 0 2px color-mix(in srgb,var(--accent) 90%,transparent),inset 0 0 42px color-mix(in srgb,var(--accent) 28%,transparent)}

/* ---- feature text (left) — chase tag removed ---- */
.feature{position:absolute;left:clamp(20px,4vw,60px);bottom:clamp(28px,9vh,90px);z-index:25;max-width:min(40vw,440px)}
.fmeta{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:#a9c4ec;margin-bottom:12px}
.ftitle{font-family:var(--font-display);font-size:clamp(40px,6.2vw,84px);line-height:.92;letter-spacing:.01em;text-transform:uppercase;margin-bottom:10px;text-shadow:0 6px 34px rgba(0,0,0,.6)}
.fsub{color:var(--dim);font-size:14.5px;font-weight:500;line-height:1.45;margin-bottom:16px}
.fprice{display:inline-flex;align-items:baseline;gap:8px;margin-bottom:22px}
.fprice .v{font-family:var(--mono);font-weight:500;font-size:30px;color:var(--money);text-shadow:0 0 22px color-mix(in srgb,var(--money) 40%,transparent)}
.fprice .l{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.enter{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:#06122b;border:0;cursor:pointer;font-family:var(--font);font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:13px;padding:14px 30px;border-radius:40px;transition:.22s}
.enter:hover{background:#fff;box-shadow:0 0 30px color-mix(in srgb,var(--accent) 60%,transparent);transform:translateY(-1px)}

/* ---- expanding dots / page counter (ported from link 2) ---- */
.dots{position:absolute;left:50%;bottom:clamp(22px,4.5vh,46px);transform:translateX(-50%);z-index:26;display:flex;gap:10px}
.dots button{height:8px;width:8px;border:0;padding:0;border-radius:99px;background:rgba(255,255,255,.32);cursor:pointer;transition:width .5s cubic-bezier(.22,1,.36,1),background .5s}
.dots button.on{width:30px;background:var(--blue-bright);box-shadow:0 0 14px color-mix(in srgb,var(--blue-bright) 75%,transparent)}
.scrollcue{position:absolute;right:clamp(20px,4vw,56px);bottom:clamp(22px,4.5vh,46px);z-index:26;font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(143,168,200,.7)}

/* ---- scroll-down marquee (ported from link 2, faded-gradient text) ---- */
.marquee{position:relative;z-index:10;padding:clamp(70px,11vh,130px) 0;
  background:linear-gradient(180deg, transparent, rgba(3,8,22,.55) 16%, rgba(3,8,22,.55) 84%, transparent)}
.marquee .row{display:flex;overflow:hidden}
.marquee .row+.row{margin-top:6px}
.mtrack{display:flex;width:max-content;align-items:center;gap:50px;white-space:nowrap;will-change:transform}
.mtrack.left{animation:mq-left 40s linear infinite}
.mtrack.right{animation:mq-right 32s linear infinite}
.mword{display:inline-flex;align-items:center;gap:50px;font-family:var(--font-display);font-size:clamp(50px,8.5vw,120px);line-height:1;letter-spacing:.01em;
  background:linear-gradient(180deg, rgba(168,196,255,.95) 0%, rgba(59,130,255,.55) 55%, rgba(0,84,250,.12) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent}
.mword::after{content:'';width:14px;height:14px;border-radius:4px;background:linear-gradient(135deg,var(--blue-bright),rgba(0,84,250,.2));-webkit-background-clip:border-box;flex:none}
@keyframes mq-left{to{transform:translateX(-50%)}}
@keyframes mq-right{from{transform:translateX(-50%)}to{transform:translateX(0)}}
.endcap{position:relative;z-index:10;text-align:center;padding:0 24px clamp(50px,9vh,110px)}
.endcap h2{font-family:var(--font-display);font-size:clamp(34px,5vw,66px);text-transform:uppercase;letter-spacing:.01em}
.endcap p{margin-top:12px;color:var(--dim);font-size:14px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase}

@media (max-width:860px){
  .nav,.scrollcue{display:none}
  .feature{max-width:84vw;bottom:96px}
  :root{--cw:clamp(220px,66vw,380px)}
}
</style>
</head>
<body>
  <div id="bg"></div>
  <div class="vign"></div>

  <div id="intro"><div class="word">CARD<span class="x">X</span></div></div>

  <header class="topbar">
    <span class="brand">CARD<span class="k">X</span></span>
    <nav class="nav"><a class="on">Explore</a><a>Sets</a><a>Rip Lab</a><a>Binder</a></nav>
    <button class="burger" aria-label="Menu"><span></span><span></span></button>
  </header>

  <main>
    <section class="hero">
      <div class="tilt"><div class="ring" id="ring"></div></div>

      <section class="feature" id="feature">
        <div class="fmeta" id="fMeta"></div>
        <h1 class="ftitle" id="fTitle"></h1>
        <p class="fsub" id="fSub"></p>
        <div class="fprice"><span class="v" id="fPrice"></span><span class="l">market value</span></div>
        <div><button class="enter" id="enter">Enter <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button></div>
      </section>

      <div class="dots" id="dots"></div>
      <div class="scrollcue">Scroll ↓</div>
    </section>

    <section class="marquee">
      <div class="row"><div class="mtrack left" id="mqA"></div></div>
      <div class="row"><div class="mtrack right" id="mqB"></div></div>
    </section>

    <div class="endcap">
      <h2>Every chase card. One place.</h2>
      <p>Pokémon · Magic · Lorcana · One Piece</p>
    </div>
  </main>

  <script src="vendor/three.min.js"></script>
  <script src="vendor/gsap.min.js"></script>
  <script>
  (() => {
    'use strict';
    const $ = (s) => document.querySelector(s);
    const fmt = (p) => '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const ALL = [
      {uni:'Pokémon',name:'Umbreon ex',set:'Prismatic Evolutions',rar:'Special Illustration Rare',price:1557.92,accent:'#ffcb05',img:'https://assets.tcgdex.net/en/sv/sv08.5/161/high.png'},
      {uni:'Pokémon',name:'Mega Gengar ex',set:'Ascended Heroes',rar:'Special Illustration Rare',price:1384.78,accent:'#ffcb05',img:'https://assets.tcgdex.net/en/me/me02.5/284/high.png'},
      {uni:'Pokémon',name:'Pikachu ex',set:'Ascended Heroes',rar:'Special Illustration Rare',price:1276.19,accent:'#ffcb05',img:'https://assets.tcgdex.net/en/me/me02.5/276/high.png'},
      {uni:'Pokémon',name:'Mew ex',set:'Paldean Fates',rar:'Special Illustration Rare',price:968.49,accent:'#ffcb05',img:'https://assets.tcgdex.net/en/sv/sv04.5/232/high.png'},
      {uni:'Magic',name:'Force of Negation',set:'Final Fantasy Region',rar:'Borderless',price:1492.99,accent:'#e8943b',img:'https://cards.scryfall.io/large/front/b/c/bc5376cb-82f6-43c7-bf8b-43515791e082.jpg'},
      {uni:'Magic',name:'Giant Growth',set:'Secret Lair Drop',rar:'Borderless',price:662.0,accent:'#e8943b',img:'https://cards.scryfall.io/large/front/6/5/65a168b8-285b-4725-a982-671557d4f0bc.jpg'},
      {uni:'Magic',name:'Lightning Bolt',set:'Secret Lair Promo',rar:'Borderless',price:623.15,accent:'#e8943b',img:'https://cards.scryfall.io/large/front/b/9/b9399b98-a545-47b2-99bb-6d8251d9ae76.jpg'},
      {uni:'Magic',name:'Mox Opal',set:'Double Masters',rar:'Borderless',price:342.82,accent:'#e8943b',img:'https://cards.scryfall.io/large/front/5/4/547e3aa5-d88a-4418-ab9d-dd65385f031b.jpg'},
      {uni:'One Piece',name:'Buggy',set:'OP09',rar:'Alt-Art',price:1479.32,accent:'#ff5b4d',img:'https://static.dotgg.gg/onepiece/card/OP09-051_p2.webp'},
      {uni:'One Piece',name:'Marshall D Teach',set:'OP09',rar:'Alt-Art',price:1446.5,accent:'#ff5b4d',img:'https://static.dotgg.gg/onepiece/card/OP09-093_p2.webp'},
      {uni:'One Piece',name:'Monkey D Luffy',set:'EB02',rar:'Alt-Art',price:1388.75,accent:'#ff5b4d',img:'https://static.dotgg.gg/onepiece/card/EB02-010_p2.webp'},
      {uni:'One Piece',name:'Portgas D Ace',set:'OP13',rar:'Alt-Art',price:1315.33,accent:'#ff5b4d',img:'https://static.dotgg.gg/onepiece/card/OP13-119_p2.webp'},
      {uni:'Lorcana',name:'Cinderella',set:'Enchanted · Ursula',rar:'Enchanted',price:null,accent:'#7fd4f4',img:'https://cards.lorcast.io/card/digital/large/crd_eaf7db4a652b47939bddb0db4c9030e9.avif'},
      {uni:'Lorcana',name:'Minnie Mouse',set:'Enchanted · Ursula',rar:'Enchanted',price:null,accent:'#7fd4f4',img:'https://cards.lorcast.io/card/digital/large/crd_b20587f1945e42d59b750f9b69cc4a6b.avif'},
      {uni:'Lorcana',name:'Ursula',set:'Enchanted · Ursula',rar:'Enchanted',price:null,accent:'#7fd4f4',img:'https://cards.lorcast.io/card/digital/large/crd_68c45595c25041f3bcf2073a5b533edd.avif'},
      {uni:'Lorcana',name:'Yen Sid',set:'Enchanted · Ursula',rar:'Enchanted',price:null,accent:'#7fd4f4',img:'https://cards.lorcast.io/card/digital/large/crd_34dd94ad32194a96931c9e2ff311ad26.avif'}
    ];
    // interleave universes so the wheel cycles through colours as it spins
    const byUni = (u) => ALL.filter((c) => c.uni === u);
    const groups = [byUni('Pokémon'), byUni('Magic'), byUni('One Piece'), byUni('Lorcana')];
    const WHEEL = [];
    for (let i = 0; i < 4; i++) groups.forEach((g) => { if (g[i]) WHEEL.push(g[i]); });

    // ---------- build the ring ----------
    const ring = $('#ring'), dotsEl = $('#dots');
    const N = WHEEL.length, STEP = 360 / N;
    let cards = [];
    WHEEL.forEach((c, i) => {
      const el = document.createElement('div');
      el.className = 'card'; el.dataset.i = i; el.style.setProperty('--accent', c.accent);
      el.innerHTML = `<div class="face front" style="background-image:url('${c.img}')"><span class="edge"></span></div><div class="face back"></div>`;
      el.addEventListener('click', () => seekTo(i));
      ring.appendChild(el);
      const d = document.createElement('button'); d.dataset.i = i;
      d.addEventListener('click', () => seekTo(i));
      dotsEl.appendChild(d);
    });
    cards = [...ring.children];
    const dots = [...dotsEl.children];

    // ---------- geometry / continuous spin ----------
    let RX = 760, RZ = 380;                 // wide + shallow = oval, not a circle
    function sizeRing() {
      RX = Math.max(440, Math.min(innerWidth * 0.52, 880));
      RZ = RX * 0.46;
    }
    sizeRing(); addEventListener('resize', sizeRing);

    let rot = 0;                            // ring rotation, degrees
    let target = null;                      // when seeking to a dot/card
    let paused = false;                     // hover-pause
    const SPIN = 6.5;                       // degrees / second — slow drift
    let active = -1;

    function place() {
      for (let i = 0; i < N; i++) {
        const a = (i * STEP + rot) * Math.PI / 180;
        const x = Math.sin(a) * RX, z = Math.cos(a) * RZ;
        cards[i].style.transform = `translate3d(${x}px,0,${z}px) rotateY(${i * STEP + rot}deg)`;
        cards[i].style.zIndex = String(1000 + Math.round(z));
      }
    }
    function updateActive() {
      const idx = ((Math.round(-rot / STEP) % N) + N) % N;
      if (idx === active) return;
      active = idx;
      cards.forEach((el, i) => el.classList.toggle('is-active', i === active));
      dots.forEach((d, i) => d.classList.toggle('on', i === active));
      const c = WHEEL[active];
      document.documentElement.style.setProperty('--accent', c.accent);
      $('#fMeta').textContent = c.uni + ' · ' + c.set;
      $('#fTitle').textContent = c.name;
      $('#fSub').textContent = c.rar + ' — a chase of ' + c.uni + '.';
      const fp = document.querySelector('.fprice');
      if (c.price != null) { fp.style.display = 'inline-flex'; $('#fPrice').textContent = fmt(c.price); }
      else { fp.style.display = 'none'; }
      gsap.fromTo('.feature', { opacity: .25, x: -14 }, { opacity: 1, x: 0, duration: .5, ease: 'power2.out' });
    }
    function seekTo(i) {
      // shortest rotation that brings card i to the front (i*STEP + rot ≡ 0)
      let want = -i * STEP;
      while (want - rot > 180) want -= 360;
      while (want - rot < -180) want += 360;
      target = want;
    }

    let last = 0;
    function frame(now) {
      const dt = last ? Math.min((now - last) / 1000, 0.05) : 0; last = now;
      if (target !== null) {
        rot += (target - rot) * 0.12;
        if (Math.abs(target - rot) < 0.05) { rot = target; target = null; }
      } else if (!paused) {
        rot -= SPIN * dt;                   // negative = forward spin through the list
      }
      place(); updateActive();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // hover the wheel to pause the drift; arrows + enter
    const hero = document.querySelector('.hero');
    hero.addEventListener('pointerenter', () => paused = true);
    hero.addEventListener('pointerleave', () => paused = false);
    addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') seekTo((active + 1) % N);
      else if (e.key === 'ArrowLeft') seekTo((active - 1 + N) % N);
    });
    $('#enter').onclick = () => gsap.fromTo(cards[active], { scale: 1 }, { scale: 1.06, duration: .18, yoyo: true, repeat: 1, ease: 'power2.out' });

    // ---------- marquee (faded-gradient moving text) ----------
    const WORDS_A = ['POKÉMON', 'CHASE HITS', 'MAGIC', 'GRADED 10', 'ONE PIECE', 'SEALED', 'LORCANA', 'ALT ART'];
    const WORDS_B = ['SPECIAL ILLUSTRATION', 'VAULT', 'BORDERLESS', 'ENCHANTED', 'SECRET RARE', 'THE HUNT'];
    const fillTrack = (el, words) => {
      const set = words.map((w) => `<span class="mword">${w}</span>`).join('');
      el.innerHTML = set + set;            // duplicate for a seamless loop
    };
    fillTrack($('#mqA'), WORDS_A);
    fillTrack($('#mqB'), WORDS_B);

    // ---------- mouse-reactive WebGL background (ported from link 2) ----------
    (function background() {
      if (!window.THREE) return;
      const mount = $('#bg');
      const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      mount.appendChild(renderer.domElement);
      const scene = new THREE.Scene();
      const camera = new THREE.Camera();
      const uniforms = {
        uTime: { value: 0 },
        uRes: { value: new THREE.Vector2(innerWidth, innerHeight) },
        uMouse: { value: new THREE.Vector2(0, 0) }
      };
      const FRAG = `
        precision highp float;
        uniform float uTime; uniform vec2 uRes; uniform vec2 uMouse;
        vec2 hash2(vec2 p){ p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))); return -1.0+2.0*fract(sin(p)*43758.5453123); }
        float noise(vec2 p){ vec2 i=floor(p),f=fract(p); vec2 u=f*f*(3.0-2.0*f);
          return mix(mix(dot(hash2(i+vec2(0,0)),f-vec2(0,0)),dot(hash2(i+vec2(1,0)),f-vec2(1,0)),u.x),
                     mix(dot(hash2(i+vec2(0,1)),f-vec2(0,1)),dot(hash2(i+vec2(1,1)),f-vec2(1,1)),u.x),u.y); }
        float fbm(vec2 p){ float v=0.0,a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);
          for(int i=0;i<4;i++){ v+=a*noise(p); p=m*p; a*=0.5; } return v; }
        void main(){
          vec2 uv=(gl_FragCoord.xy-0.5*uRes)/uRes.y; float t=uTime*0.06;
          float warp=fbm(uv*1.8+vec2(t,t*0.4)+uMouse*0.15)*2.4;
          float h=uv.y*11.0+warp+uv.x*1.5;
          float lines=pow(0.5+0.5*cos(h*6.2831),80.0);
          lines*=smoothstep(1.1,0.1,length(uv)*0.7);
          vec3 base=vec3(0.010,0.017,0.045);
          vec3 lineCol=mix(vec3(0.10,0.26,0.72),vec3(0.35,0.5,0.95),lines);
          vec3 col=base+lines*lineCol*0.58;
          float glow=smoothstep(0.9,0.0,length(uv*vec2(1.4,1.0)));
          col+=glow*vec3(0.0,0.30,0.95)*0.10;
          col*=mix(0.6,1.0,smoothstep(-0.7,0.5,uv.y));
          col*=mix(0.45,1.0,smoothstep(1.5,0.2,length(uv)));
          gl_FragColor=vec4(col,1.0);
        }`;
      const material = new THREE.ShaderMaterial({
        vertexShader: 'void main(){ gl_Position=vec4(position,1.0); }',
        fragmentShader: FRAG, uniforms, depthTest: false, depthWrite: false
      });
      scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));
      const m = { x: 0, y: 0 };
      addEventListener('pointermove', (e) => { m.x = (e.clientX / innerWidth) * 2 - 1; m.y = -((e.clientY / innerHeight) * 2 - 1); });
      addEventListener('resize', () => { renderer.setSize(innerWidth, innerHeight); uniforms.uRes.value.set(innerWidth, innerHeight); });
      const start = performance.now();
      (function tick() {
        uniforms.uTime.value = (performance.now() - start) / 1000;
        uniforms.uMouse.value.x += (m.x - uniforms.uMouse.value.x) * 0.04;
        uniforms.uMouse.value.y += (m.y - uniforms.uMouse.value.y) * 0.04;
        renderer.render(scene, camera);
        requestAnimationFrame(tick);
      })();
    })();

    // ---------- intro dismissal (robust: never strands if the tab is hidden) ----------
    const intro = $('#intro');
    // wrap each character so it can animate in (CARD text + the X span)
    (function stagger() {
      const word = intro.querySelector('.word');
      const letters = [];
      word.childNodes.forEach((n) => {
        if (n.nodeType === 3) { // text node "CARD"
          const frag = document.createDocumentFragment();
          n.textContent.split('').forEach((ch) => { const s = document.createElement('span'); s.textContent = ch; frag.appendChild(s); letters.push(s); });
          word.replaceChild(frag, n);
        } else { letters.push(n); }
      });
      [...word.children].forEach((s, i) => s.style.animationDelay = (i * 0.08) + 's');
    })();
    let introGone = false;
    const t0 = performance.now();
    const killIntro = () => { if (introGone) return; introGone = true; intro.remove(); };
    setTimeout(() => intro.classList.add('leaving'), 2100);
    setTimeout(killIntro, 3050);
    // Only a backstop: if the tab was frozen and the timers never ran, force the
    // intro away once we're past when it should already be gone. Never cuts the
    // animation short on a normal load.
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && performance.now() - t0 > 3000) killIntro();
    });
  })();
  </script>
</body>
</html>
