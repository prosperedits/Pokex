<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POKEX — Concept Home</title>
<meta name="description" content="POKEX home concept — pick a universe, spin its chase cards.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a140d; --green:#43e06b; --green-bright:#7bff9e; --ink:#eafaef; --dim:#8fb89a;
  --accent:#43e06b; --money:#5fe2a0;
  --font:'DM Sans', system-ui, sans-serif; --font-display:'Anton','DM Sans',sans-serif; --mono:'DM Mono', monospace;
  --cw:clamp(320px, 38vw, 600px); --ch:calc(var(--cw) / 0.717);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--font)}
body{background:
    radial-gradient(120% 90% at 50% -10%, rgba(60,140,80,.30) 0%, transparent 55%),
    radial-gradient(90% 80% at 80% 120%, rgba(20,60,35,.6) 0%, transparent 60%),
    linear-gradient(180deg,#0c1810 0%,#070f0a 100%);-webkit-font-smoothing:antialiased}
canvas#topo{position:fixed;inset:0;z-index:0;opacity:.85}
.vign{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(100% 75% at 50% 46%, transparent 38%, rgba(4,9,6,.66) 100%)}

/* top bar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:22px clamp(20px,4vw,54px)}
.brand{display:inline-flex;align-items:center;gap:10px;border:2px solid var(--ink);font-family:var(--font-display);
  padding:8px 13px 5px;font-weight:400;letter-spacing:.16em;font-size:19px;line-height:1}
.brand .k{color:var(--green-bright)}
.nav{display:flex;gap:clamp(20px,3vw,46px)}
.nav a{color:var(--dim);text-decoration:none;font-weight:700;font-size:13px;letter-spacing:.22em;text-transform:uppercase;transition:.2s;position:relative;padding:4px 0;cursor:pointer}
.nav a:hover,.nav a.on{color:var(--ink)}
.nav a.on::after{content:'';position:absolute;left:0;right:0;bottom:-4px;height:2px;background:var(--green)}

/* ---------- universe picker ---------- */
.picker{position:fixed;inset:0;z-index:18;display:grid;place-items:center;perspective:1500px}
.pick-head{position:absolute;top:15%;left:0;right:0;text-align:center}
.pick-head .eye{font-family:var(--mono);font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--green-bright);opacity:.9}
.pick-head h1{font-family:var(--font-display);font-weight:400;font-size:clamp(40px,6.5vw,90px);letter-spacing:.02em;text-transform:uppercase;line-height:.95;margin-top:10px}
.pick-row{display:flex;align-items:center;gap:clamp(18px,5vw,90px);transform-style:preserve-3d}
.uni{position:relative;width:clamp(150px,17vw,270px);aspect-ratio:1;display:grid;place-items:center;cursor:pointer;
  background:none;border:0;transform-style:preserve-3d;transition:transform .35s cubic-bezier(.16,1,.3,1)}
.uni .logo{width:100%;will-change:transform;
  filter:drop-shadow(0 16px 30px rgba(0,0,0,.6)) drop-shadow(0 0 30px color-mix(in srgb,var(--accent) 55%,transparent))}
.uni .disc{position:absolute;bottom:-2%;width:78%;height:20px;border-radius:50%;filter:blur(7px);
  background:radial-gradient(closest-side, color-mix(in srgb,var(--accent) 60%,transparent), transparent)}
.uni .nm{position:absolute;bottom:-22%;left:0;right:0;text-align:center;font-family:var(--font-display);font-weight:400;
  font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:#dff7e6;opacity:.85;transition:.3s}
.uni:hover{transform:scale(1.08) translateZ(40px)}
.uni:hover .nm{opacity:1;color:color-mix(in srgb,var(--accent) 80%,#fff)}
.pick-hint{position:fixed;left:50%;bottom:7%;transform:translateX(-50%);z-index:19;font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:rgba(143,184,154,.6);text-transform:uppercase}

/* ---------- 3D card ring ---------- */
.scene{position:fixed;inset:0;z-index:10;display:grid;place-items:center;perspective:1500px;perspective-origin:50% 45%;opacity:0;pointer-events:none}
.scene.on{opacity:1;pointer-events:auto}
.tilt{transform-style:preserve-3d;transform:rotateX(13deg) rotateZ(-1deg);will-change:transform}
.ring{position:relative;width:1px;height:1px;transform-style:preserve-3d;transition:transform 1s cubic-bezier(.16,1,.3,1);will-change:transform}
.card{position:absolute;width:var(--cw);height:var(--ch);left:calc(var(--cw)/-2);top:calc(var(--ch)/-2);transform-style:preserve-3d;cursor:pointer;will-change:transform}
.face{position:absolute;inset:0;border-radius:15px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.front{background:#0c160f center/cover no-repeat;box-shadow:0 26px 54px -22px rgba(0,0,0,.85)}
.front .edge{position:absolute;inset:0;border-radius:15px;box-shadow:inset 0 0 0 1.5px color-mix(in srgb,var(--accent) 38%,transparent),inset 0 0 26px color-mix(in srgb,var(--accent) 16%,transparent)}
.back{transform:rotateY(180deg);display:grid;place-items:center;overflow:hidden;
  background:repeating-linear-gradient(45deg, transparent 0 7px, color-mix(in srgb,var(--accent) 7%,transparent) 7px 8px),
    repeating-linear-gradient(-45deg, transparent 0 7px, color-mix(in srgb,var(--accent) 7%,transparent) 7px 8px),
    radial-gradient(72% 64% at 50% 40%, color-mix(in srgb,var(--accent) 26%,#0b160e), #060d09)}
.back .uni-l{position:absolute;top:10%;font-weight:800;letter-spacing:.22em;font-size:10px;text-transform:uppercase;color:color-mix(in srgb,var(--accent) 80%,#fff);opacity:.85}
.back .emblem{position:relative;display:grid;place-items:center;width:56%;aspect-ratio:1}
.back .emblem::before,.back .emblem::after{content:'';position:absolute;border-radius:50%;border:1.5px solid color-mix(in srgb,var(--accent) 48%,transparent)}
.back .emblem::before{inset:0;box-shadow:0 0 22px color-mix(in srgb,var(--accent) 42%,transparent),inset 0 0 14px color-mix(in srgb,var(--accent) 26%,transparent)}
.back .emblem::after{inset:15%;border-style:dashed;opacity:.7}
.back .pb{width:58%;opacity:.72;filter:drop-shadow(0 0 12px color-mix(in srgb,var(--accent) 85%,transparent))}
.back .bk{position:absolute;bottom:10%;font-weight:900;letter-spacing:.28em;font-size:11px;color:#e6fbed;opacity:.72}
.back::after{content:'';position:absolute;inset:9px;border-radius:11px;border:1.5px solid color-mix(in srgb,var(--accent) 34%,transparent)}
.card.is-active .front{box-shadow:0 44px 80px -18px rgba(0,0,0,.85),0 0 60px color-mix(in srgb,var(--accent) 42%,transparent)}
.card.is-active .front .edge{box-shadow:inset 0 0 0 2px color-mix(in srgb,var(--accent) 85%,transparent),inset 0 0 40px color-mix(in srgb,var(--accent) 26%,transparent)}

/* feature overlay */
.feature{position:fixed;left:clamp(20px,4vw,58px);bottom:clamp(26px,7vh,68px);z-index:25;max-width:min(42vw,460px);opacity:0;pointer-events:none}
.feature.on{pointer-events:auto}
.fpill{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#bfeccb;margin-bottom:14px}
.fpill .hot{display:inline-flex;align-items:center;gap:5px;background:color-mix(in srgb,var(--accent) 22%,transparent);color:#fff;padding:4px 9px;border-radius:20px;border:1px solid color-mix(in srgb,var(--accent) 50%,transparent)}
.fpill .tags{color:var(--dim)}
.ftitle{font-family:var(--font-display);font-weight:400;font-size:clamp(40px,6.4vw,82px);line-height:.92;letter-spacing:.01em;text-transform:uppercase;margin-bottom:10px;text-shadow:0 4px 30px rgba(0,0,0,.6)}
.fsub{color:var(--dim);font-size:14.5px;font-weight:500;line-height:1.45;margin-bottom:16px}
.fprice{display:inline-flex;align-items:baseline;gap:8px;margin-bottom:22px}
.fprice .v{font-family:var(--mono);font-weight:700;font-size:30px;color:var(--money);text-shadow:0 0 22px color-mix(in srgb,var(--money) 40%,transparent)}
.fprice .l{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.enter{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:#08110b;border:0;cursor:pointer;font-family:var(--font);font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:13px;padding:14px 30px;border-radius:40px;transition:.22s}
.enter:hover{background:var(--green-bright);box-shadow:0 0 30px color-mix(in srgb,var(--accent) 60%,transparent);transform:translateY(-1px)}

/* back to universes */
.backbtn{position:fixed;top:88px;left:clamp(20px,4vw,54px);z-index:30;display:none;align-items:center;gap:8px;background:rgba(8,16,11,.5);border:1.5px solid rgba(95,210,130,.2);color:var(--dim);
  font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:9px 16px;border-radius:30px;cursor:pointer;backdrop-filter:blur(8px);transition:.2s}
.backbtn:hover{color:var(--ink);border-color:var(--green)}
.backbtn.on{display:inline-flex}

/* side controls */
.side{position:fixed;right:clamp(16px,3vw,40px);top:50%;transform:translateY(-50%);z-index:25;display:none;flex-direction:column;gap:14px}
.side.on{display:flex}
.sbtn{width:50px;height:50px;border-radius:50%;border:1.5px solid rgba(95,210,130,.18);background:rgba(8,16,11,.5);color:var(--ink);cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(8px);transition:.2s}
.sbtn:hover{border-color:var(--green);color:var(--green-bright);box-shadow:0 0 24px rgba(67,224,107,.3)}
.sbtn svg{width:18px;height:18px}
.sbtn.play{position:relative}
.sbtn.play .rg{position:absolute;inset:-1.5px;border-radius:50%;border:1.5px solid transparent;border-top-color:var(--green);animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
body.paused .sbtn.play .rg{animation-play-state:paused;opacity:.3}

/* thumb strip */
.strip{position:fixed;right:clamp(16px,3vw,40px);bottom:clamp(20px,4vh,40px);z-index:25;display:none;align-items:center;gap:14px}
.strip.on{display:flex}
.strip .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase}
.thumbs{display:flex;gap:8px}
.thumb{width:38px;height:53px;border-radius:7px;overflow:hidden;border:1.5px solid rgba(95,210,130,.18);cursor:pointer;background:#08110b;transition:.2s;flex:none}
.thumb img{width:100%;height:100%;object-fit:cover;filter:brightness(.78)}
.thumb:hover{transform:translateY(-3px)}
.thumb.on{border-color:var(--accent);box-shadow:0 0 16px color-mix(in srgb,var(--accent) 60%,transparent)}
.thumb.on img{filter:brightness(1.05)}

/* loader */
.loader{position:fixed;inset:0;z-index:80;background:#070f0a;display:grid;place-items:center}
.ld-mark{font-family:var(--font-display);font-weight:400;letter-spacing:.2em;font-size:clamp(44px,7.5vw,92px);line-height:1;border:3px solid var(--ink);padding:16px 24px 10px;display:inline-block;clip-path:inset(0 100% 0 0)}
.ld-mark .k{color:var(--green-bright)}
.ld-bar{width:min(280px,60vw);height:2px;background:rgba(95,210,130,.18);margin:30px auto 12px;overflow:hidden}
.ld-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--green-bright));box-shadow:0 0 14px var(--green)}
.ld-meta{display:flex;justify-content:space-between;width:min(280px,60vw);margin:0 auto;font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}
.ld-count{color:var(--green-bright)}.ld-wrap{text-align:center}

@media (max-width:860px){ .nav,.strip .lbl{display:none} .feature{max-width:84vw;bottom:118px} .pick-row{flex-wrap:wrap;justify-content:center;gap:36px 28px} :root{--cw:clamp(260px,70vw,420px)} }
</style>
</head>
<body>
  <canvas id="topo"></canvas>
  <div class="vign"></div>

  <header class="topbar">
    <span class="brand">PO<span class="k">KE</span>X</span>
    <nav class="nav"><a class="on" data-home>Explore</a><a>Sets</a><a>Rip Lab</a><a>Binder</a></nav>
    <span class="brand" style="border-color:rgba(95,210,130,.2);color:var(--dim);font-size:12px;letter-spacing:.18em">CONCEPT</span>
  </header>

  <section class="picker" id="picker">
    <div class="pick-head"><div class="eye">P® Cards</div><h1>Pick a universe</h1></div>
    <div class="pick-row" id="pickRow"></div>
  </section>
  <div class="pick-hint" id="pickHint">Four universes · every chase card · one place</div>

  <button class="backbtn" id="backbtn">← Universes</button>
  <main class="scene" id="scene"><div class="tilt"><div class="ring" id="ring"></div></div></main>

  <section class="feature" id="feature">
    <div class="fpill"><span class="hot">🔥 CHASE</span><span class="tags" id="fTags"></span></div>
    <h1 class="ftitle" id="fTitle"></h1>
    <p class="fsub" id="fSub"></p>
    <div class="fprice"><span class="v" id="fPrice"></span><span class="l">market value</span></div>
    <div><button class="enter" id="enter">Enter <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button></div>
  </section>

  <div class="side" id="side">
    <button class="sbtn play" id="play" title="Pause"><span class="rg"></span><svg id="playIc" viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="5" width="3.4" height="14" rx="1"/><rect x="13.6" y="5" width="3.4" height="14" rx="1"/></svg></button>
    <button class="sbtn" id="next" title="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>
    <button class="sbtn" id="prev" title="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>
  </div>

  <div class="strip" id="strip"><span class="lbl">Chase cards</span><div class="thumbs" id="thumbs"></div></div>

  <div class="loader" id="loader"><div class="ld-wrap">
    <div class="ld-mark" id="ldMark">PO<span class="k">KE</span>X</div>
    <div class="ld-bar"><i id="ldBar"></i></div>
    <div class="ld-meta"><span>Loading the vault</span><span class="ld-count" id="ldCount">0%</span></div>
  </div></div>

  <script src="vendor/gsap.min.js"></script>
  <script>
  (() => {
    'use strict';
    const $ = (s) => document.querySelector(s);
    const fmt = (p) => '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const UNIVERSES = [
      { key:'Pokémon',  short:'Pokémon',  accent:'#ffcb05', logo:'assets/logos/pokemon.png' },
      { key:'Magic',    short:'Magic',    accent:'#e8943b', logo:'assets/logos/magic.png' },
      { key:'Lorcana',  short:'Lorcana',  accent:'#7fd4f4', logo:'assets/logos/lorcana.png' },
      { key:'One Piece',short:'One Piece',accent:'#ff5b4d', logo:'assets/logos/onepiece.png' },
    ];
    const T = 'https://assets.tcgdex.net/en/me/', S = 'https://cards.scryfall.io/large/front/', D = 'https://static.dotgg.gg/onepiece/card/', L = 'https://cards.lorcast.io/card/digital/large/';
    const ALL = [
      // Pokémon
      {uni:'Pokémon',name:'Mega Gengar ex',set:'Ascended Heroes',rar:'Special Illustration Rare',price:1384.78,accent:'#ffcb05',img:T+'me02.5/284/high.png'},
      {uni:'Pokémon',name:'Mega Dragonite ex',set:'Ascended Heroes',rar:'Special Illustration Rare',price:876.23,accent:'#ffcb05',img:T+'me02.5/290/high.png'},
      {uni:'Pokémon',name:'Pikachu ex',set:'Ascended Heroes',rar:'Special Illustration Rare',price:463.42,accent:'#ffcb05',img:T+'me02.5/277/high.png'},
      {uni:'Pokémon',name:"Team Rocket's Mewtwo",set:'Ascended Heroes',rar:'Special Illustration Rare',price:454.39,accent:'#ffcb05',img:T+'me02.5/281/high.png'},
      {uni:'Pokémon',name:'Mega Greninja ex',set:'Chaos Rising',rar:'Special Illustration Rare',price:353.31,accent:'#ffcb05',img:T+'me04/116/high.png'},
      // Magic (Power Nine — Alpha/Beta market values approximate)
      {uni:'Magic',name:'Black Lotus',set:'Alpha',rar:'Power Nine',price:12000,accent:'#e8943b',img:S+'b/d/bd8fa327-dd41-4737-8f19-2cf5eb1f7cdd.jpg'},
      {uni:'Magic',name:'Timetwister',set:'Unlimited',rar:'Power Nine',price:5142,accent:'#e8943b',img:S+'f/b/fbee1e10-0b8c-44ea-b0e5-44cdd0bfcd76.jpg'},
      {uni:'Magic',name:'Mox Jet',set:'Beta',rar:'Power Nine',price:4000,accent:'#e8943b',img:S+'1/3/133204e4-fef8-4851-aa50-c96ffa35b802.jpg'},
      {uni:'Magic',name:'Ancestral Recall',set:'Alpha',rar:'Power Nine',price:3500,accent:'#e8943b',img:S+'2/3/2398892d-28e9-4009-81ec-0d544af79d2b.jpg'},
      {uni:'Magic',name:'Time Walk',set:'Alpha',rar:'Power Nine',price:2500,accent:'#e8943b',img:S+'7/0/70901356-3266-4bd9-aacc-f06c27271de5.jpg'},
      // One Piece
      {uni:'One Piece',name:'Buggy',set:'OP-09',rar:'Secret Rare',price:1479.32,accent:'#ff5b4d',img:D+'OP09-051_p2.webp'},
      {uni:'One Piece',name:'Marshall D. Teach',set:'OP-09',rar:'Secret Rare',price:1446.50,accent:'#ff5b4d',img:D+'OP09-093_p2.webp'},
      {uni:'One Piece',name:'Monkey D. Luffy',set:'OP-11',rar:'Secret Rare',price:1366.52,accent:'#ff5b4d',img:D+'OP11-118_p2.webp'},
      {uni:'One Piece',name:'Portgas D. Ace',set:'OP-13',rar:'Secret Rare',price:1315.33,accent:'#ff5b4d',img:D+'OP13-119_p2.webp'},
      {uni:'One Piece',name:'Tony Tony Chopper',set:'EB-01',rar:'Secret Rare',price:1267.50,accent:'#ff5b4d',img:D+'EB01-006_p3.webp'},
      // Lorcana
      {uni:'Lorcana',name:'Rapunzel',set:'The First Chapter',rar:'Legendary',price:18.53,accent:'#7fd4f4',img:L+'crd_63a9a93217614c00a186fe10b8791073.avif'},
      {uni:'Lorcana',name:'Mickey Mouse',set:'The First Chapter',rar:'Legendary',price:9.85,accent:'#7fd4f4',img:L+'crd_e74ef94562b9440e8dd95ada098728d6.avif'},
      {uni:'Lorcana',name:'Beast',set:'Rise of the Floodborn',rar:'Legendary',price:9.00,accent:'#7fd4f4',img:L+'crd_7ffeed1a4c364378ab7814dda3b99b73.avif'},
      {uni:'Lorcana',name:'Hades',set:'The First Chapter',rar:'Legendary',price:8.55,accent:'#7fd4f4',img:L+'crd_e372495979314c78b3613e2b19c30366.avif'},
      {uni:'Lorcana',name:'Stitch',set:'The First Chapter',rar:'Legendary',price:4.92,accent:'#7fd4f4',img:L+'crd_78e5de38150f48c5b9813c08cc534dfb.avif'},
    ];

    // ---------- state ----------
    let CARDS = [], N = 0, STEP = 0, cards = [], active = 0, autoplay = true, autoTimer = 0, R = 900;
    const ring = $('#ring'), thumbsEl = $('#thumbs');

    function buildRing(subset) {
      CARDS = subset; N = subset.length; STEP = 360 / N; active = 0;
      ring.replaceChildren(); thumbsEl.replaceChildren();
      subset.forEach((c, i) => {
        const el = document.createElement('div'); el.className = 'card'; el.dataset.i = i; el.style.setProperty('--accent', c.accent);
        el.innerHTML = `<div class="face front" style="background-image:url('${c.img}')"><span class="edge"></span></div>
          <div class="face back"><span class="uni-l">${c.uni}</span><span class="emblem"><img class="pb" src="assets/pokex-ball.png" alt=""></span><span class="bk">POKEX</span></div>`;
        el.addEventListener('click', () => { if (+el.dataset.i !== active) setActive(+el.dataset.i); });
        ring.appendChild(el);
        const t = document.createElement('button'); t.className = 'thumb'; t.dataset.i = i; t.style.setProperty('--accent', c.accent);
        t.innerHTML = `<img src="${c.img}" alt="${c.name}">`;
        t.addEventListener('click', () => setActive(i));
        thumbsEl.appendChild(t);
      });
      cards = [...ring.children];
      placeCards(); layout(); updateFeature();
    }
    function placeCards() { cards.forEach((el, i) => el.style.transform = `rotateY(${i * STEP}deg) translateZ(${R}px)`); }
    function layout() {
      ring.style.transform = `translateZ(${-R}px) rotateY(${-active * STEP}deg)`;
      cards.forEach((el, i) => el.classList.toggle('is-active', i === active));
      [...thumbsEl.children].forEach((t, i) => t.classList.toggle('on', i === active));
    }
    function updateFeature() {
      const c = CARDS[active]; if (!c) return;
      document.documentElement.style.setProperty('--accent', c.accent);
      gsap.fromTo('#feature', { opacity: 0, x: -16 }, { opacity: 1, x: 0, duration: .5, ease: 'power2.out' });
      $('#fTags').textContent = c.uni + ' · ' + c.set;
      $('#fTitle').textContent = c.name;
      $('#fSub').textContent = c.rar + ' — a chase of ' + c.uni + '.';
      $('#fPrice').textContent = fmt(c.price);
    }
    function setActive(i) { active = ((i % N) + N) % N; layout(); updateFeature(); restartAuto(); }
    function step(d) { setActive(active + d); }
    function restartAuto() { clearInterval(autoTimer); if (autoplay && view === 'carousel') autoTimer = setInterval(() => step(1), 4600); }

    // ---------- view switching ----------
    let view = 'picker';
    function enterUniverse(uni) {
      view = 'carousel';
      buildRing(ALL.filter((c) => c.uni === uni));
      gsap.to('#picker', { opacity: 0, scale: 1.1, duration: .5, ease: 'power2.in', onComplete: () => $('#picker').style.display = 'none' });
      gsap.to('#pickHint', { opacity: 0, duration: .3 });
      $('#scene').classList.add('on'); $('#feature').classList.add('on'); $('#side').classList.add('on'); $('#strip').classList.add('on'); $('#backbtn').classList.add('on');
      gsap.fromTo('#scene', { opacity: 0 }, { opacity: 1, duration: .6, delay: .25 });
      gsap.fromTo('.tilt', { opacity: 0, scale: .8, rotationY: -30 }, { opacity: 1, scale: 1, rotationY: 0, duration: 1.1, ease: 'power3.out', delay: .25 });
      gsap.fromTo(['#side', '#strip', '#backbtn'], { opacity: 0 }, { opacity: 1, duration: .5, delay: .5, stagger: .06 });
      restartAuto();
    }
    function backToPicker() {
      view = 'picker'; clearInterval(autoTimer);
      $('#scene').classList.remove('on'); $('#feature').classList.remove('on'); $('#side').classList.remove('on'); $('#strip').classList.remove('on'); $('#backbtn').classList.remove('on');
      document.documentElement.style.setProperty('--accent', '#43e06b');
      const p = $('#picker'); p.style.display = 'grid';
      gsap.fromTo('#picker', { opacity: 0, scale: .94 }, { opacity: 1, scale: 1, duration: .6, ease: 'power2.out' });
      gsap.fromTo('.uni', { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: .6, stagger: .08, ease: 'power2.out' });
      gsap.to('#pickHint', { opacity: 1, duration: .4, delay: .2 });
      floatLogos();
    }

    // ---------- picker build ----------
    const pickRow = $('#pickRow');
    UNIVERSES.forEach((u) => {
      const b = document.createElement('button'); b.className = 'uni'; b.style.setProperty('--accent', u.accent);
      b.innerHTML = `<img class="logo" src="${u.logo}" alt="${u.short}"><span class="disc"></span><span class="nm">${u.short}</span>`;
      b.addEventListener('click', () => enterUniverse(u.key));
      pickRow.appendChild(b);
    });
    const uniLogos = [...document.querySelectorAll('.uni .logo')];
    function floatLogos() {
      uniLogos.forEach((img, i) => {
        gsap.killTweensOf(img);
        gsap.set(img, { transformOrigin: '50% 60%' });
        gsap.to(img, { rotationY: 18, duration: 2.6 + i * .2, ease: 'sine.inOut', yoyo: true, repeat: -1, startAt: { rotationY: -18 } });
        gsap.to(img, { y: -16, duration: 2.2 + i * .15, ease: 'sine.inOut', yoyo: true, repeat: -1 });
      });
    }

    // ---------- controls ----------
    $('#next').onclick = () => step(1);
    $('#prev').onclick = () => step(-1);
    $('#enter').onclick = () => { const c = cards[active]; gsap.timeline().to(c, { scale: 1.07, duration: .2 }).to('.tilt', { scale: 2.3, opacity: 0, duration: .6, ease: 'power3.in' }, '>-.02').add(() => { gsap.set('.tilt', { scale: 1, opacity: 1 }); gsap.set(c, { scale: 1 }); gsap.from('.tilt', { opacity: 0, scale: .9, duration: .5 }); }); };
    $('#backbtn').onclick = backToPicker;
    $('#play').onclick = () => { autoplay = !autoplay; document.body.classList.toggle('paused', !autoplay);
      $('#playIc').innerHTML = autoplay ? '<rect x="7" y="5" width="3.4" height="14" rx="1"/><rect x="13.6" y="5" width="3.4" height="14" rx="1"/>' : '<path d="M8 5v14l11-7z"/>'; restartAuto(); };
    $('[data-home]').onclick = () => { if (view === 'carousel') backToPicker(); };
    addEventListener('keydown', (e) => { if (view !== 'carousel') return; if (e.key === 'ArrowRight') step(1); else if (e.key === 'ArrowLeft') step(-1); else if (e.key === 'Escape') backToPicker(); });
    let dragX = null, acc = 0;
    addEventListener('pointerdown', (e) => { if (view !== 'carousel' || e.target.closest('.sbtn,.enter,.thumb,.nav,.backbtn')) return; dragX = e.clientX; });
    addEventListener('pointermove', (e) => { if (dragX === null) return; const dx = e.clientX - dragX; if (Math.abs(dx) > 80) { step(dx < 0 ? 1 : -1); dragX = e.clientX; } });
    addEventListener('pointerup', () => dragX = null);
    addEventListener('wheel', (e) => { if (view !== 'carousel') return; acc += e.deltaY + e.deltaX; if (Math.abs(acc) > 110) { step(acc > 0 ? 1 : -1); acc = 0; } }, { passive: true });
    window.__deck = { enterUniverse, backToPicker, setActive, step, pause: () => { autoplay = false; clearInterval(autoTimer); document.body.classList.add('paused'); } };

    // ---------- topo ----------
    const cv = $('#topo'), cx2 = cv.getContext('2d');
    let W, H, cX, cY;
    function size() { W = cv.width = innerWidth; H = cv.height = innerHeight; cX = W * .5; cY = H * .36; }
    size(); addEventListener('resize', () => { size(); if (view === 'carousel') { placeCards(); layout(); } });
    const hex = (h) => { const n = parseInt(h.slice(1), 16); return [n >> 16 & 255, n >> 8 & 255, n & 255]; };
    let curCol = [67, 224, 107];
    function draw(t) {
      cx2.clearRect(0, 0, W, H);
      const a = hex((getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#43e06b'));
      curCol = curCol.map((c, k) => c + (((a[k] + 67 * 2) / 3 - c) * .04));
      for (let i = 0; i < 30; i++) {
        cx2.beginPath();
        for (let aa = 0; aa <= 6.4; aa += .14) { const wob = Math.sin(aa * 3 + t * .0004 + i * .55) * 12 + Math.sin(aa * 5 - t * .00028 + i) * 7; const r = 50 + i * 36 + wob; const x = cX + Math.cos(aa) * r * 1.7, y = cY + Math.sin(aa) * r * .92; aa === 0 ? cx2.moveTo(x, y) : cx2.lineTo(x, y); }
        cx2.closePath(); cx2.strokeStyle = `rgba(${curCol[0]|0},${curCol[1]|0},${curCol[2]|0},${i % 5 === 0 ? .085 : .035})`; cx2.lineWidth = i % 5 === 0 ? 1.3 : 1; cx2.stroke();
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    // ---------- intro → picker ----------
    gsap.set(['.topbar', '.picker', '#pickHint'], { opacity: 0 });
    function intro() {
      const c = { v: 0 };
      gsap.timeline()
        .to('#ldMark', { clipPath: 'inset(0 0% 0 0)', duration: 1.0, ease: 'power2.inOut' })
        .to('#ldBar', { width: '100%', duration: 1.5, ease: 'power1.inOut' }, 0)
        .to(c, { v: 100, duration: 1.5, ease: 'power1.inOut', onUpdate: () => $('#ldCount').textContent = Math.round(c.v) + '%' }, 0)
        .to('#loader', { autoAlpha: 0, duration: .6 }, '+=.12')
        .to('.topbar', { opacity: 1, duration: .6 }, '-=.3')
        .to('.picker', { opacity: 1, duration: .5 }, '-=.4')
        .from('.pick-head .eye', { opacity: 0, y: 12, duration: .5 }, '-=.2')
        .from('.pick-head h1', { opacity: 0, y: 18, duration: .6 }, '-=.3')
        .from('.uni', { opacity: 0, y: 40, scale: .8, duration: .8, stagger: .1, ease: 'power3.out' }, '-=.3')
        .to('#pickHint', { opacity: 1, duration: .5 }, '-=.3')
        .add(floatLogos, '-=.6');
    }
    let booted = false; const boot = () => { if (booted) return; booted = true; intro(); };
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => setTimeout(boot, 40));
    setTimeout(boot, 600);
    setTimeout(() => { if (getComputedStyle($('#loader')).opacity !== '0') { gsap.set('#loader', { autoAlpha: 0 }); gsap.set(['.topbar', '.picker', '#pickHint'], { opacity: 1 }); floatLogos(); } }, 4800);
  })();
  </script>
</body>
</html>
