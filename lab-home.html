<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POKEX — Concept Home</title>
<meta name="description" content="ApeChain-styled concept home for POKEX — a tilted 3D card ring.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a140d; --green:#43e06b; --green-bright:#7bff9e; --ink:#eafaef; --dim:#8fb89a;
  --accent:#43e06b; --money:#5fe2a0;
  --font:'DM Sans', system-ui, sans-serif; --font-display:'Anton', 'DM Sans', sans-serif; --mono:'DM Mono', monospace;
  --cw:clamp(320px, 38vw, 600px); --ch:calc(var(--cw) / 0.717);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--font)}
body{
  background:
    radial-gradient(120% 90% at 50% -10%, rgba(60,140,80,.30) 0%, transparent 55%),
    radial-gradient(90% 80% at 80% 120%, rgba(20,60,35,.6) 0%, transparent 60%),
    linear-gradient(180deg,#0c1810 0%,#070f0a 100%);
  -webkit-font-smoothing:antialiased;
}
canvas#topo{position:fixed;inset:0;z-index:0;opacity:.85}
.vign{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(100% 75% at 50% 46%, transparent 38%, rgba(4,9,6,.66) 100%)}

/* top bar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;
  justify-content:space-between;padding:22px clamp(20px,4vw,54px)}
.brand{display:inline-flex;align-items:center;gap:10px;border:2px solid var(--ink);font-family:var(--font-display);
  padding:8px 13px 5px;font-weight:400;letter-spacing:.16em;font-size:19px;line-height:1}
.brand .k{color:var(--green-bright)}
.nav{display:flex;gap:clamp(20px,3vw,46px)}
.nav a{color:var(--dim);text-decoration:none;font-weight:700;font-size:13px;letter-spacing:.22em;
  text-transform:uppercase;transition:.2s;position:relative;padding:4px 0}
.nav a:hover,.nav a.on{color:var(--ink)}
.nav a.on::after{content:'';position:absolute;left:0;right:0;bottom:-4px;height:2px;background:var(--green)}

/* 3D ring */
.scene{position:fixed;inset:0;z-index:10;display:grid;place-items:center;
  perspective:1500px;perspective-origin:50% 45%}
.tilt{transform-style:preserve-3d;transform:rotateX(13deg) rotateZ(-1deg);will-change:transform}
.ring{position:relative;width:1px;height:1px;transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(.16,1,.3,1);will-change:transform}
.card{position:absolute;width:var(--cw);height:var(--ch);left:calc(var(--cw)/-2);top:calc(var(--ch)/-2);
  transform-style:preserve-3d;cursor:pointer;will-change:transform}
.face{position:absolute;inset:0;border-radius:15px;overflow:hidden;
  backface-visibility:hidden;-webkit-backface-visibility:hidden}
.front{background:#0c160f center/cover no-repeat;box-shadow:0 26px 54px -22px rgba(0,0,0,.85)}
.front .edge{position:absolute;inset:0;border-radius:15px;
  box-shadow:inset 0 0 0 1.5px color-mix(in srgb,var(--accent) 38%,transparent),
             inset 0 0 26px color-mix(in srgb,var(--accent) 16%,transparent)}
.back{transform:rotateY(180deg);display:grid;place-items:center;overflow:hidden;
  background:
    repeating-linear-gradient(45deg, transparent 0 7px, color-mix(in srgb,var(--accent) 7%,transparent) 7px 8px),
    repeating-linear-gradient(-45deg, transparent 0 7px, color-mix(in srgb,var(--accent) 7%,transparent) 7px 8px),
    radial-gradient(72% 64% at 50% 40%, color-mix(in srgb,var(--accent) 26%,#0b160e), #060d09)}
.back .uni{position:absolute;top:10%;font-weight:800;letter-spacing:.22em;font-size:9px;text-transform:uppercase;
  color:color-mix(in srgb,var(--accent) 80%, #fff);opacity:.85}
.back .emblem{position:relative;display:grid;place-items:center;width:56%;aspect-ratio:1}
.back .emblem::before,.back .emblem::after{content:'';position:absolute;border-radius:50%;
  border:1.5px solid color-mix(in srgb,var(--accent) 48%,transparent)}
.back .emblem::before{inset:0;box-shadow:0 0 22px color-mix(in srgb,var(--accent) 42%,transparent),inset 0 0 14px color-mix(in srgb,var(--accent) 26%,transparent)}
.back .emblem::after{inset:15%;border-style:dashed;opacity:.7}
.back .pb{width:58%;opacity:.72;filter:drop-shadow(0 0 12px color-mix(in srgb,var(--accent) 85%,transparent))}
.back .bk{position:absolute;bottom:10%;font-weight:900;letter-spacing:.28em;font-size:11px;color:#e6fbed;opacity:.72}
.back::after{content:'';position:absolute;inset:9px;border-radius:11px;
  border:1.5px solid color-mix(in srgb,var(--accent) 34%,transparent)}
.card.is-active{z-index:5}
.card.is-active .front{box-shadow:0 44px 80px -18px rgba(0,0,0,.85),0 0 60px color-mix(in srgb,var(--accent) 42%,transparent)}
.card.is-active .front .edge{box-shadow:inset 0 0 0 2px color-mix(in srgb,var(--accent) 85%,transparent),
             inset 0 0 40px color-mix(in srgb,var(--accent) 26%,transparent)}

/* feature overlay */
.feature{position:fixed;left:clamp(20px,4vw,58px);bottom:clamp(26px,7vh,68px);z-index:25;max-width:min(42vw,460px)}
.fpill{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;color:#bfeccb;margin-bottom:14px}
.fpill .hot{display:inline-flex;align-items:center;gap:5px;background:color-mix(in srgb,var(--accent) 22%,transparent);
  color:#fff;padding:4px 9px;border-radius:20px;border:1px solid color-mix(in srgb,var(--accent) 50%,transparent)}
.fpill .tags{color:var(--dim)}
.ftitle{font-family:var(--font-display);font-weight:400;font-size:clamp(40px,6.4vw,82px);line-height:.92;letter-spacing:.01em;text-transform:uppercase;
  margin-bottom:10px;text-shadow:0 4px 30px rgba(0,0,0,.6)}
.fsub{color:var(--dim);font-size:14.5px;font-weight:500;line-height:1.45;margin-bottom:16px}
.fprice{display:inline-flex;align-items:baseline;gap:8px;margin-bottom:22px}
.fprice .v{font-family:var(--mono);font-weight:700;font-size:30px;color:var(--money);
  text-shadow:0 0 22px color-mix(in srgb,var(--money) 40%,transparent)}
.fprice .l{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.enter{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:#08110b;border:0;cursor:pointer;
  font-family:var(--font);font-weight:800;letter-spacing:.16em;text-transform:uppercase;font-size:13px;
  padding:14px 30px;border-radius:40px;transition:.22s}
.enter:hover{background:var(--green-bright);box-shadow:0 0 30px color-mix(in srgb,var(--accent) 60%,transparent);transform:translateY(-1px)}

/* side controls */
.side{position:fixed;right:clamp(16px,3vw,40px);top:50%;transform:translateY(-50%);z-index:25;display:flex;flex-direction:column;gap:14px}
.sbtn{width:50px;height:50px;border-radius:50%;border:1.5px solid rgba(95,210,130,.18);background:rgba(8,16,11,.5);
  color:var(--ink);cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(8px);transition:.2s}
.sbtn:hover{border-color:var(--green);color:var(--green-bright);box-shadow:0 0 24px rgba(67,224,107,.3)}
.sbtn svg{width:18px;height:18px}
.sbtn.play{position:relative}
.sbtn.play .rg{position:absolute;inset:-1.5px;border-radius:50%;border:1.5px solid transparent;border-top-color:var(--green);animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
body.paused .sbtn.play .rg{animation-play-state:paused;opacity:.3}

/* app strip */
.strip{position:fixed;right:clamp(16px,3vw,40px);bottom:clamp(20px,4vh,40px);z-index:25;display:flex;align-items:center;gap:14px}
.strip .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase}
.thumbs{display:flex;gap:8px}
.thumb{width:38px;height:53px;border-radius:7px;overflow:hidden;border:1.5px solid rgba(95,210,130,.18);cursor:pointer;background:#08110b;transition:.2s;flex:none}
.thumb img{width:100%;height:100%;object-fit:cover;filter:brightness(.78)}
.thumb:hover{transform:translateY(-3px)}
.thumb.on{border-color:var(--accent);box-shadow:0 0 16px color-mix(in srgb,var(--accent) 60%,transparent)}
.thumb.on img{filter:brightness(1.05)}
.hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:25;font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:rgba(143,184,154,.55);text-transform:uppercase}

/* loader */
.loader{position:fixed;inset:0;z-index:80;background:#070f0a;display:grid;place-items:center}
.ld-mark{font-family:var(--font-display);font-weight:400;letter-spacing:.2em;font-size:clamp(44px,7.5vw,92px);line-height:1;border:3px solid var(--ink);padding:16px 24px 10px;display:inline-block;clip-path:inset(0 100% 0 0)}
.ld-mark .k{color:var(--green-bright)}
.ld-bar{width:min(280px,60vw);height:2px;background:rgba(95,210,130,.18);margin:30px auto 12px;overflow:hidden}
.ld-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--green-bright));box-shadow:0 0 14px var(--green)}
.ld-meta{display:flex;justify-content:space-between;width:min(280px,60vw);margin:0 auto;font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}
.ld-count{color:var(--green-bright)}
.ld-wrap{text-align:center}

@media (max-width:820px){ .nav,.strip .lbl{display:none} .feature{max-width:84vw;bottom:120px} :root{--cw:clamp(140px,30vw,190px)} }
</style>
</head>
<body>
  <canvas id="topo"></canvas>
  <div class="vign"></div>

  <header class="topbar">
    <span class="brand">PO<span class="k">KE</span>X</span>
    <nav class="nav"><a href="#" class="on">Explore</a><a href="#">Sets</a><a href="#">Rip Lab</a><a href="#">Binder</a></nav>
    <span class="brand" style="border-color:rgba(95,210,130,.2);color:var(--dim);font-size:12px;letter-spacing:.18em">CONCEPT</span>
  </header>

  <main class="scene"><div class="tilt"><div class="ring" id="ring"></div></div></main>

  <section class="feature" id="feature">
    <div class="fpill"><span class="hot">🔥 CHASE</span><span class="tags" id="fTags"></span></div>
    <h1 class="ftitle" id="fTitle"></h1>
    <p class="fsub" id="fSub"></p>
    <div class="fprice"><span class="v" id="fPrice"></span><span class="l">market value</span></div>
    <div><button class="enter" id="enter">Enter <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button></div>
  </section>

  <div class="side">
    <button class="sbtn play" id="play" title="Pause"><span class="rg"></span><svg id="playIc" viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="5" width="3.4" height="14" rx="1"/><rect x="13.6" y="5" width="3.4" height="14" rx="1"/></svg></button>
    <button class="sbtn" id="next" title="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>
    <button class="sbtn" id="prev" title="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>
  </div>

  <div class="strip"><span class="lbl">All chase cards</span><div class="thumbs" id="thumbs"></div></div>
  <div class="hint">Drag · scroll · arrow keys — back of every card on the far side</div>

  <div class="loader" id="loader"><div class="ld-wrap">
    <div class="ld-mark" id="ldMark">PO<span class="k">KE</span>X</div>
    <div class="ld-bar"><i id="ldBar"></i></div>
    <div class="ld-meta"><span>Loading the vault</span><span class="ld-count" id="ldCount">0%</span></div>
  </div></div>

  <script src="vendor/gsap.min.js"></script>
  <script>
  (() => {
    'use strict';
    const $ = (s) => document.querySelector(s);
    // highest-value chase card per universe (live image URLs)
    const CARDS = [
      { uni:'Pokémon',  name:'Pikachu ex',      set:'Ascended Heroes',  rar:'Special Illustration Rare', price:463.42,  accent:'#ffcb05', img:'https://assets.tcgdex.net/en/me/me02.5/277/high.png' },
      { uni:'Magic',    name:'Timetwister',     set:'Unlimited Edition', rar:'Power Nine',               price:5142.00, accent:'#e8943b', img:'https://cards.scryfall.io/large/front/f/b/fbee1e10-0b8c-44ea-b0e5-44cdd0bfcd76.jpg' },
      { uni:'One Piece',name:'Monkey D. Luffy', set:'OP-11',            rar:'Secret Rare',              price:1366.52, accent:'#ff5b4d', img:'https://static.dotgg.gg/onepiece/card/OP11-118_p2.webp' },
      { uni:'Lorcana',  name:'Rapunzel',        set:'The First Chapter', rar:'Legendary',               price:18.53,   accent:'#7fd4f4', img:'https://cards.lorcast.io/card/digital/large/crd_63a9a93217614c00a186fe10b8791073.avif' },
      { uni:'Pokémon',  name:'Mega Greninja ex',set:'Chaos Rising',     rar:'Special Illustration Rare', price:353.31,  accent:'#ffcb05', img:'https://assets.tcgdex.net/en/me/me04/116/high.png' },
      { uni:'Magic',    name:'Mox Jet',         set:'Beta',             rar:'Power Nine',               price:4000.00, accent:'#e8943b', img:'https://cards.scryfall.io/large/front/1/3/133204e4-fef8-4851-aa50-c96ffa35b802.jpg' },
      { uni:'One Piece',name:'Portgas D. Ace',  set:'OP-13',            rar:'Secret Rare',              price:1315.33, accent:'#ff5b4d', img:'https://static.dotgg.gg/onepiece/card/OP13-119_p2.webp' },
      { uni:'Lorcana',  name:'Mickey Mouse',    set:'The First Chapter', rar:'Legendary',               price:9.85,    accent:'#7fd4f4', img:'https://cards.lorcast.io/card/digital/large/crd_e74ef94562b9440e8dd95ada098728d6.avif' },
    ];
    const N = CARDS.length, STEP = 360 / N;
    let R = 900; // ring radius (depth + spacing between cards)
    const ring = $('#ring'), thumbsEl = $('#thumbs');
    let active = 0, autoplay = true, autoTimer = 0;

    CARDS.forEach((c, i) => {
      const el = document.createElement('div'); el.className = 'card'; el.dataset.i = i;
      el.style.setProperty('--accent', c.accent);
      el.innerHTML =
        `<div class="face front" style="background-image:url('${c.img}')"><span class="edge"></span></div>
         <div class="face back"><span class="uni">${c.uni}</span><span class="emblem"><img class="pb" src="assets/pokex-ball.png" alt=""></span><span class="bk">POKEX</span></div>`;
      el.addEventListener('click', () => { if (+el.dataset.i !== active) setActive(+el.dataset.i); else enter(); });
      ring.appendChild(el);
      const t = document.createElement('button'); t.className = 'thumb'; t.dataset.i = i; t.style.setProperty('--accent', c.accent);
      t.innerHTML = `<img src="${c.img}" alt="${c.name}">`;
      t.addEventListener('click', () => setActive(i));
      thumbsEl.appendChild(t);
    });
    const cards = [...ring.children];
    function placeCards() { cards.forEach((el, i) => el.style.transform = `rotateY(${i * STEP}deg) translateZ(${R}px)`); }

    function layout() {
      ring.style.transform = `translateZ(${-R}px) rotateY(${-active * STEP}deg)`;
      cards.forEach((el, i) => el.classList.toggle('is-active', i === active));
      [...thumbsEl.children].forEach((t, i) => t.classList.toggle('on', i === active));
    }
    function updateFeature() {
      const c = CARDS[active];
      document.documentElement.style.setProperty('--accent', c.accent);
      gsap.fromTo('#feature', { opacity: 0, x: -16 }, { opacity: 1, x: 0, duration: .5, ease: 'power2.out' });
      $('#fTags').textContent = c.uni + ' · ' + c.set;
      $('#fTitle').textContent = c.name;
      $('#fSub').textContent = c.rar + ' — the chase of ' + c.uni + '.';
      $('#fPrice').textContent = '$' + c.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function setActive(i) { active = ((i % N) + N) % N; layout(); updateFeature(); restartAuto(); }
    function step(d) { setActive(active + d); }

    function enter() {
      const c = cards[active];
      gsap.timeline()
        .to(c, { scale: 1.08, duration: .2, ease: 'power2.out' })
        .to('.tilt', { scale: 2.4, opacity: 0, duration: .7, ease: 'power3.in' }, '>-.05')
        .add(() => { gsap.set('.tilt', { scale: 1, opacity: 1 }); gsap.set(c, { scale: 1 });
          gsap.from('.tilt', { opacity: 0, scale: .88, duration: .6, ease: 'power2.out' }); });
    }

    $('#next').onclick = () => step(1);
    $('#prev').onclick = () => step(-1);
    $('#enter').onclick = enter;
    $('#play').onclick = () => { autoplay = !autoplay; document.body.classList.toggle('paused', !autoplay);
      $('#playIc').innerHTML = autoplay ? '<rect x="7" y="5" width="3.4" height="14" rx="1"/><rect x="13.6" y="5" width="3.4" height="14" rx="1"/>' : '<path d="M8 5v14l11-7z"/>';
      restartAuto(); };
    addEventListener('keydown', (e) => { if (e.key === 'ArrowRight') step(1); else if (e.key === 'ArrowLeft') step(-1); else if (e.key === 'Enter') enter(); });
    let dragX = null, acc = 0;
    addEventListener('pointerdown', (e) => { if (e.target.closest('.sbtn,.enter,.thumb,.nav')) return; dragX = e.clientX; });
    addEventListener('pointermove', (e) => { if (dragX === null) return; const dx = e.clientX - dragX; if (Math.abs(dx) > 80) { step(dx < 0 ? 1 : -1); dragX = e.clientX; } });
    addEventListener('pointerup', () => dragX = null);
    addEventListener('wheel', (e) => { acc += e.deltaY + e.deltaX; if (Math.abs(acc) > 110) { step(acc > 0 ? 1 : -1); acc = 0; } }, { passive: true });
    function restartAuto() { clearInterval(autoTimer); if (autoplay) autoTimer = setInterval(() => step(1), 4600); }
    window.__deck = { setActive, step, pause: () => { autoplay = false; clearInterval(autoTimer); document.body.classList.add('paused'); }, setR: (v) => { R = v; placeCards(); layout(); } };

    // topographic canvas
    const cv = $('#topo'), cx2 = cv.getContext('2d');
    let W, H, cX, cY;
    function size() { W = cv.width = innerWidth; H = cv.height = innerHeight; cX = W * .5; cY = H * .36; }
    size(); addEventListener('resize', () => { size(); placeCards(); layout(); });
    const RINGS = 30, hexToRgb = (h) => { const n = parseInt(h.slice(1), 16); return [n >> 16 & 255, n >> 8 & 255, n & 255]; };
    let curCol = [67, 224, 107];
    function draw(t) {
      cx2.clearRect(0, 0, W, H);
      const acc = hexToRgb((getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#43e06b'));
      curCol = curCol.map((c, k) => c + (((acc[k] + 67 * 2) / 3 - c) * .04));
      for (let i = 0; i < RINGS; i++) {
        cx2.beginPath();
        for (let a = 0; a <= 6.4; a += .14) {
          const wob = Math.sin(a * 3 + t * .0004 + i * .55) * 12 + Math.sin(a * 5 - t * .00028 + i) * 7;
          const r = 50 + i * 36 + wob;
          const x = cX + Math.cos(a) * r * 1.7, y = cY + Math.sin(a) * r * .92;
          a === 0 ? cx2.moveTo(x, y) : cx2.lineTo(x, y);
        }
        cx2.closePath();
        cx2.strokeStyle = `rgba(${curCol[0]|0},${curCol[1]|0},${curCol[2]|0},${i % 5 === 0 ? .085 : .035})`;
        cx2.lineWidth = i % 5 === 0 ? 1.3 : 1; cx2.stroke();
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    // intro
    placeCards(); layout();
    gsap.set(['.topbar', '.side', '.strip', '.hint', '#feature'], { opacity: 0 });
    gsap.set('.card', { opacity: 0 });
    function intro() {
      const c = { v: 0 };
      gsap.timeline()
        .to('#ldMark', { clipPath: 'inset(0 0% 0 0)', duration: 1.0, ease: 'power2.inOut' })
        .to('#ldBar', { width: '100%', duration: 1.5, ease: 'power1.inOut' }, 0)
        .to(c, { v: 100, duration: 1.5, ease: 'power1.inOut', onUpdate: () => $('#ldCount').textContent = Math.round(c.v) + '%' }, 0)
        .to('#loader', { autoAlpha: 0, duration: .6, ease: 'power2.inOut' }, '+=.12')
        .from('.tilt', { opacity: 0, scale: .72, rotationX: 26, rotationY: -40, duration: 1.3, ease: 'power3.out' }, '-=.3')
        .to('.card', { opacity: 1, duration: .7, stagger: { each: .07, from: 'center' }, ease: 'power2.out' }, '-=1.0')
        .to('.topbar', { opacity: 1, duration: .6 }, '-=.7')
        .to('#feature', { opacity: 1, duration: .6, startAt: { y: 24 }, y: 0 }, '-=.5')
        .to(['.side', '.strip'], { opacity: 1, duration: .5, stagger: .08 }, '-=.5')
        .to('.hint', { opacity: 1, duration: .5 }, '-=.3')
        .add(() => { updateFeature(); restartAuto(); }, '-=.6');
    }
    let booted = false; const boot = () => { if (booted) return; booted = true; intro(); };
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => setTimeout(boot, 40));
    setTimeout(boot, 600);
    // safety net: if GSAP stalls (e.g. backgrounded tab), force the resting state so the loader never traps
    setTimeout(() => {
      if (getComputedStyle($('#loader')).opacity !== '0') {
        gsap.set('#loader', { autoAlpha: 0 });
        gsap.set(['.card', '.topbar', '.side', '.strip', '.hint', '#feature'], { opacity: 1, clearProps: 'transform' });
        updateFeature(); restartAuto();
      }
    }, 4800);
  })();
  </script>
</body>
</html>
