<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POKEX — Binder</title>
<meta name="description" content="Build your own POKEX binder — drag cards into the pockets, page by page.">
<link rel="icon" type="image/png" href="assets/pokex-ball-64.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://assets.tcgdex.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand/tokens.css?v=48">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-synthesis: none; }
html { background: #0B0A10; }
body {
  min-height: 100vh; color: var(--text); font-family: var(--font-ui);
  background:
    radial-gradient(80% 55% at 50% -10%, rgba(127, 212, 244, 0.10) 0%, transparent 60%),
    radial-gradient(70% 80% at 110% 100%, rgba(196, 75, 173, 0.08) 0%, transparent 55%),
    #0B0A10;
  overflow-x: hidden;
}
.chrome { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: var(--s-3) var(--s-5); min-height: 64px; }
.chrome .back { justify-self: end; }
.logo-pokex { display: inline-flex; line-height: 1; text-decoration: none; }
.logo-pokex .lx {
  font-family: var(--font-logo-x); font-size: 46px;
  background: linear-gradient(178deg, #EAF7FF 6%, var(--spectral-bright) 28%, var(--spectral) 54%, #1B5E96 78%, #9FE2FF 96%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  filter: drop-shadow(0 0 20px rgba(61, 155, 224, 0.5));
}
.page-title {
  font-family: var(--font-display); font-size: clamp(18px, 2.2vw, 26px);
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--spectral-bright);
  text-shadow: 0 0 22px rgba(127, 212, 244, 0.35);
}
.back {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-dim); text-decoration: none; border: 1px solid var(--stage-line);
  padding: 8px 16px; clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
}
.back:hover { color: var(--text); border-color: var(--text-faint); }

main { max-width: 1600px; margin: 0 auto; padding: var(--s-3) var(--s-5) var(--s-8); }
.layout { display: grid; grid-template-columns: clamp(300px, 27vw, 380px) 1fr; gap: clamp(16px, 2vw, 34px); align-items: start; }

/* ------- the bank ------- */
.bank {
  position: sticky; top: 14px;
  background: linear-gradient(170deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.07); border-radius: 14px;
  padding: var(--s-4); box-shadow: 0 24px 60px rgba(0,0,0,0.45);
  display: flex; flex-direction: column; max-height: calc(100vh - 30px);
}
.bank h2 {
  font-family: var(--font-display); font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text); margin-bottom: 2px;
}
.bank .hint { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-bottom: var(--s-3); }
.bank-controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: var(--s-3); }
.bank select, .bank input {
  width: 100%; box-sizing: border-box; font-family: var(--font-mono); font-size: 12px; color: var(--text);
  background: rgba(20, 18, 29, 0.72); border: 1px solid var(--stage-line); border-radius: 8px; padding: 8px 11px; outline: none;
}
.bank select:focus, .bank input:focus { border-color: var(--spectral); }
.chips { display: flex; gap: 6px; }
.chip {
  flex: 1; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--text-dim); background: transparent; border: 1px solid var(--stage-line); border-radius: 999px;
  padding: 6px 4px; cursor: pointer; transition: color var(--dur-fast), background var(--dur-fast), border-color var(--dur-fast);
}
.chip:hover { color: var(--text); }
.chip.active { color: #06121a; background: var(--spectral); border-color: var(--spectral); font-weight: 600; }
.bank-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; overflow-y: auto; padding: 2px 4px 2px 0; scrollbar-width: thin; }
.bank-card {
  position: relative; aspect-ratio: 734 / 1024; border-radius: 6px; overflow: hidden; cursor: grab;
  background: rgba(8,7,12,0.5); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  transition: transform 0.15s, box-shadow 0.15s;
}
.bank-card:hover { transform: translateY(-2px); box-shadow: inset 0 0 0 1px rgba(127,212,244,0.55), 0 10px 22px rgba(0,0,0,0.5); z-index: 2; }
.bank-card img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
.bank-card.dragging { opacity: 0.4; }
.bank-card .badge { position: absolute; top: 3px; right: 3px; font-size: 9px; line-height: 1; padding: 2px 3px; border-radius: 4px; background: rgba(0,0,0,0.6); }
.bank-card .badge.wish { color: #ff7eb6; } .bank-card .badge.coll { color: var(--spectral-bright); }
.bank-empty { grid-column: 1 / -1; font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); text-align: center; padding: 30px 10px; line-height: 1.6; }
.bank-foot { margin-top: var(--s-3); font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); display: flex; justify-content: space-between; }
.bank-foot button {
  font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim);
  background: transparent; border: none; cursor: pointer; padding: 0;
}
.bank-foot button:hover { color: var(--ember); }

/* ------- the binder ------- */
.binder-stage { display: flex; flex-direction: column; align-items: center; }
.binder-meta {
  display: flex; align-items: baseline; justify-content: center; gap: var(--s-3);
  font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); margin-bottom: var(--s-3);
}
.binder-meta .total { color: var(--money); font-weight: 600; }
.binder {
  width: 100%; max-width: 760px; border-radius: 16px;
  background: linear-gradient(160deg, #1a1726, #141019);
  padding: clamp(16px, 2.4vw, 32px); perspective: 2200px;
  box-shadow: 0 40px 90px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.07);
}
.page {
  background: linear-gradient(170deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  border-radius: 10px; padding: clamp(12px, 1.7vw, 22px); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  transform-origin: left center;
}
.page.flip-next { animation: flipNext 0.5s cubic-bezier(0.16,1,0.3,1); }
.page.flip-prev { animation: flipPrev 0.5s cubic-bezier(0.16,1,0.3,1); }
@keyframes flipNext { from { transform: rotateY(-78deg); opacity: 0.25; } to { transform: rotateY(0); opacity: 1; } }
@keyframes flipPrev { from { transform: rotateY(78deg); opacity: 0.25; } to { transform: rotateY(0); opacity: 1; } }
.page-grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: clamp(8px, 1vw, 15px); }
.pocket {
  position: relative; aspect-ratio: 734 / 1024; border-radius: 7px; overflow: hidden;
  background: rgba(8, 7, 12, 0.55);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07), inset 0 2px 10px rgba(0,0,0,0.5);
  transition: box-shadow 0.16s, transform 0.16s;
}
.pocket::after { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 3;
  background: linear-gradient(135deg, rgba(255,255,255,0.16) 0%, transparent 24%, transparent 70%, rgba(255,255,255,0.06) 100%); }
.pocket.empty { background: repeating-linear-gradient(45deg, rgba(255,255,255,0.018) 0 10px, rgba(255,255,255,0.04) 10px 20px); }
.pocket.empty::before { content: ''; position: absolute; inset: 38%; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.12); }
.pocket.over { box-shadow: inset 0 0 0 2px var(--spectral-bright), 0 0 22px rgba(127,212,244,0.45); transform: scale(1.03); }
.pocket.filled { cursor: grab; }
.pocket.filled.dragging { opacity: 0.4; }
.pocket img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
.pocket .pk-pr {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 2; padding: 12px 8px 5px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: #fff; text-align: center;
  background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent); text-shadow: 0 1px 4px #000;
}
.pocket .pk-x {
  position: absolute; top: 4px; right: 4px; z-index: 4; width: 20px; height: 20px; border-radius: 50%;
  border: none; background: rgba(8,6,12,0.75); color: #fff; font-size: 13px; line-height: 20px; cursor: pointer;
  opacity: 0; transition: opacity 0.15s; padding: 0;
}
.pocket.filled:hover .pk-x { opacity: 1; }
.pocket .pk-x:hover { background: var(--ember); }

.nav { display: flex; align-items: center; justify-content: center; gap: var(--s-4); margin-top: var(--s-5); }
.nav button {
  font-family: var(--font-ui); font-weight: 600; font-size: 14px; color: var(--text);
  background: rgba(255,255,255,0.05); border: 1px solid var(--stage-line); border-radius: 999px;
  padding: 10px 22px; cursor: pointer; transition: border-color var(--dur-fast), background var(--dur-fast), transform var(--dur-fast);
}
.nav button:hover:not(:disabled) { border-color: var(--spectral); background: rgba(255,255,255,0.1); transform: translateY(-1px); }
.nav button:disabled { opacity: 0.3; cursor: default; }
.nav .pageno { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); min-width: 120px; text-align: center; }
.nav .add { color: var(--spectral-bright); }

@media (max-width: 880px) {
  .layout { grid-template-columns: 1fr; }
  .bank { position: static; max-height: none; }
  .bank-grid { grid-template-columns: repeat(5, 1fr); max-height: 40vh; }
}
</style>
</head>
<body>
  <header class="chrome">
    <a class="logo-pokex" href="index.html" aria-label="POKEX home"><span class="lx">X</span></a>
    <span class="page-title">Binder</span>
    <a class="back" href="index.html">← back to the wheel</a>
  </header>

  <main>
    <div class="layout">
      <!-- the bank: browse / search any card, drag into the binder -->
      <aside class="bank">
        <h2>Card Bank</h2>
        <p class="hint">Drag a card into a pocket →</p>
        <div class="bank-controls">
          <select id="setSel" aria-label="Filter bank by set"></select>
          <input id="bankSearch" type="search" placeholder="Search cards…" aria-label="Search the bank">
          <div class="chips">
            <button class="chip active" data-filter="all" type="button">All</button>
            <button class="chip" data-filter="collection" type="button">◇ Collected</button>
            <button class="chip" data-filter="wishlist" type="button">♡ Wishlist</button>
          </div>
        </div>
        <div id="bankGrid" class="bank-grid"></div>
        <div class="bank-foot">
          <span id="bankCount">0 cards</span>
          <button id="autofill" type="button">Auto-fill from collection</button>
        </div>
      </aside>

      <!-- the binder: 9-pocket pages, drag to fill, flip to turn -->
      <section class="binder-stage">
        <div class="binder-meta"><span><span id="placed">0</span> cards placed</span><span>·</span><span class="total" id="total">$0.00</span></div>
        <div class="binder">
          <div id="page" class="page"><div id="pageGrid" class="page-grid"></div></div>
        </div>
        <div class="nav">
          <button id="prev" type="button">← Prev</button>
          <span class="pageno" id="pageno"></span>
          <button id="next" type="button">Next →</button>
          <button id="addPage" class="add" type="button">+ Page</button>
        </div>
      </section>
    </div>
  </main>

  <script src="data/cards-sv01.js"></script>
  <script src="data/cards-sv02.js"></script>
  <script src="data/cards-sv03.js"></script>
  <script src="data/cards-sv03.5.js"></script>
  <script src="data/cards-sv04.js"></script>
  <script src="data/cards-sv04.5.js"></script>
  <script src="data/cards-sv05.js"></script>
  <script src="data/cards-sv06.js"></script>
  <script src="data/cards-sv06.5.js"></script>
  <script src="data/cards-sv07.js"></script>
  <script src="data/cards-sv08.js"></script>
  <script src="data/cards-sv08.5.js"></script>
  <script src="data/cards-sv09.js"></script>
  <script src="data/cards-sv10.js"></script>
  <script src="data/cards-sv10.5b.js"></script>
  <script src="data/cards-sv10.5w.js"></script>
  <script src="data/cards-me01.js"></script>
  <script src="data/cards-me02.js"></script>
  <script src="data/cards-me02.5.js"></script>
  <script src="data/cards-me03.js"></script>
  <script src="data/cards-me04.js"></script>
  <script>
  (() => {
    'use strict';
    const SETS = window.CARD_SETS || {};
    const EUR_USD = 1.10;
    const safeImg = (u) => (typeof u === 'string' && u.startsWith('https://assets.tcgdex.net/')) ? u : '';
    const usd = (c) => typeof c.priceUsd === 'number' ? c.priceUsd
      : (c.cardmarket && c.cardmarket.trend != null ? c.cardmarket.trend * EUR_USD : null);
    const imgOf = (c) => safeImg(c.image + '/high.webp');

    // newest-era-first set order (matches the wheel's sense of "latest")
    const SET_ORDER = ['me04','me03','me02.5','me02','me01','sv10.5w','sv10.5b','sv10','sv09','sv08.5','sv08','sv07','sv06.5','sv06','sv05','sv04.5','sv04','sv03.5','sv03','sv02','sv01'];
    const orderedSets = SET_ORDER.filter((id) => SETS[id]);

    const byId = new Map();
    for (const sid of orderedSets) for (const c of SETS[sid].cards) byId.set(c.id, { setId: sid, setName: SETS[sid].set.name, card: c });

    const load = (k, fb) => { try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; } };
    const collection = new Set(load('pokex.collection', []));
    const wishlist = new Set(load('pokex.wishlist', []));

    // binder state: { pages: [ [id|null × 9], ... ] }
    let binder = load('pokex.binder', null);
    if (!binder || !Array.isArray(binder.pages) || !binder.pages.length) binder = { pages: [Array(9).fill(null)] };
    const save = () => localStorage.setItem('pokex.binder', JSON.stringify(binder));
    const placedIds = () => new Set(binder.pages.flat().filter(Boolean));

    let pageIdx = 0, setFilter = 'all', chip = 'all', query = '';

    // ---------- bank ----------
    const setSel = document.getElementById('setSel');
    setSel.appendChild(new Option('All sets', 'all'));
    for (const sid of orderedSets) setSel.appendChild(new Option(SETS[sid].set.name, sid));

    function bankList() {
      const placed = placedIds();
      let list = [];
      for (const sid of orderedSets) {
        if (setFilter !== 'all' && sid !== setFilter) continue;
        for (const c of SETS[sid].cards) {
          if (placed.has(c.id)) continue;                         // already in the binder
          if (chip === 'collection' && !collection.has(c.id)) continue;
          if (chip === 'wishlist' && !wishlist.has(c.id)) continue;
          if (query && !c.name.toLowerCase().includes(query)) continue;
          if (!imgOf(c)) continue;
          list.push({ setId: sid, card: c });
        }
      }
      // most valuable first — the cards you'd actually showcase
      return list.sort((a, b) => (usd(b.card) ?? -1) - (usd(a.card) ?? -1));
    }
    function renderBank() {
      const grid = document.getElementById('bankGrid');
      const list = bankList();
      grid.replaceChildren();
      document.getElementById('bankCount').textContent = `${list.length} card${list.length === 1 ? '' : 's'}`;
      if (!list.length) {
        const e = document.createElement('div'); e.className = 'bank-empty';
        e.textContent = chip === 'all' ? 'No cards match.' : `Nothing in your ${chip} yet — collect or wishlist cards on the wheel, or switch to “All”.`;
        grid.appendChild(e); return;
      }
      for (const { card } of list.slice(0, 240)) {
        const t = document.createElement('div');
        t.className = 'bank-card'; t.draggable = true; t.title = card.name; t.dataset.id = card.id;
        const img = document.createElement('img'); img.loading = 'lazy'; img.alt = card.name; img.src = imgOf(card);
        t.appendChild(img);
        if (wishlist.has(card.id)) { const b = document.createElement('span'); b.className = 'badge wish'; b.textContent = '♡'; t.appendChild(b); }
        else if (collection.has(card.id)) { const b = document.createElement('span'); b.className = 'badge coll'; b.textContent = '◇'; t.appendChild(b); }
        t.addEventListener('dragstart', (ev) => {
          ev.dataTransfer.setData('text/plain', JSON.stringify({ id: card.id, from: 'bank' }));
          ev.dataTransfer.effectAllowed = 'move'; t.classList.add('dragging');
        });
        t.addEventListener('dragend', () => t.classList.remove('dragging'));
        grid.appendChild(t);
      }
    }

    // ---------- binder page ----------
    function pageMeta() {
      const all = binder.pages.flat().filter(Boolean).map((id) => byId.get(id)).filter(Boolean);
      document.getElementById('placed').textContent = String(all.length);
      document.getElementById('total').textContent = '$' + all.reduce((s, e) => s + (usd(e.card) || 0), 0).toFixed(2);
    }
    function placeCard(slot, payload) {
      const here = binder.pages[pageIdx];
      if (payload.from === 'pocket') {
        const src = payload.slot;
        if (src === slot) return;
        const oldTarget = here[slot] ?? null; // swap the two pockets
        here[slot] = payload.id;
        here[src] = oldTarget;
      } else {
        // from bank: if a different copy somewhere, remove it first (ids are unique)
        for (const pg of binder.pages) { const k = pg.indexOf(payload.id); if (k >= 0) pg[k] = null; }
        here[slot] = payload.id;
      }
      save(); renderPage(); renderBank(); pageMeta();
    }
    function removeSlot(slot) { binder.pages[pageIdx][slot] = null; save(); renderPage(); renderBank(); pageMeta(); }

    function pocketEl(slot) {
      const id = binder.pages[pageIdx][slot];
      const entry = id ? byId.get(id) : null;
      const pk = document.createElement('div');
      pk.className = entry ? 'pocket filled' : 'pocket empty';
      pk.dataset.slot = slot;
      if (entry) {
        pk.draggable = true;
        const img = document.createElement('img'); img.loading = 'lazy'; img.alt = entry.card.name; img.src = imgOf(entry.card);
        const pr = document.createElement('span'); pr.className = 'pk-pr';
        const v = usd(entry.card); pr.textContent = v != null ? `$${v.toFixed(2)}` : entry.card.localId;
        const x = document.createElement('button'); x.className = 'pk-x'; x.type = 'button'; x.textContent = '×'; x.title = 'Remove';
        x.addEventListener('click', (ev) => { ev.stopPropagation(); removeSlot(slot); });
        pk.append(img, pr, x);
        pk.addEventListener('dragstart', (ev) => {
          ev.dataTransfer.setData('text/plain', JSON.stringify({ id, from: 'pocket', slot }));
          ev.dataTransfer.effectAllowed = 'move'; pk.classList.add('dragging');
        });
        pk.addEventListener('dragend', () => pk.classList.remove('dragging'));
      }
      pk.addEventListener('dragover', (ev) => { ev.preventDefault(); pk.classList.add('over'); });
      pk.addEventListener('dragleave', () => pk.classList.remove('over'));
      pk.addEventListener('drop', (ev) => {
        ev.preventDefault(); pk.classList.remove('over');
        try { placeCard(slot, JSON.parse(ev.dataTransfer.getData('text/plain'))); } catch {}
      });
      return pk;
    }
    function renderPage(flipDir) {
      const grid = document.getElementById('pageGrid');
      grid.replaceChildren();
      for (let i = 0; i < 9; i++) grid.appendChild(pocketEl(i));
      const page = document.getElementById('page');
      if (flipDir) {
        page.classList.remove('flip-next', 'flip-prev');
        void page.offsetWidth;                       // restart the animation
        page.classList.add(flipDir === 1 ? 'flip-next' : 'flip-prev');
      }
      document.getElementById('pageno').textContent = `Page ${pageIdx + 1} of ${binder.pages.length}`;
      document.getElementById('prev').disabled = pageIdx === 0;
      document.getElementById('next').disabled = pageIdx >= binder.pages.length - 1;
    }

    // dropping onto the bank pulls a card out of its pocket
    const bankGrid = document.getElementById('bankGrid');
    bankGrid.addEventListener('dragover', (ev) => ev.preventDefault());
    bankGrid.addEventListener('drop', (ev) => {
      ev.preventDefault();
      try { const p = JSON.parse(ev.dataTransfer.getData('text/plain')); if (p.from === 'pocket') removeSlot(p.slot); } catch {}
    });

    // ---------- controls ----------
    setSel.addEventListener('change', () => { setFilter = setSel.value; renderBank(); });
    document.getElementById('bankSearch').addEventListener('input', (e) => { query = e.target.value.trim().toLowerCase(); renderBank(); });
    document.querySelectorAll('.chip').forEach((c) => c.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach((x) => x.classList.toggle('active', x === c));
      chip = c.dataset.filter; renderBank();
    }));
    document.getElementById('prev').addEventListener('click', () => { if (pageIdx > 0) { pageIdx--; renderPage(-1); } });
    document.getElementById('next').addEventListener('click', () => { if (pageIdx < binder.pages.length - 1) { pageIdx++; renderPage(1); } });
    document.getElementById('addPage').addEventListener('click', () => {
      binder.pages.push(Array(9).fill(null)); save(); pageIdx = binder.pages.length - 1; renderPage(1);
    });
    document.getElementById('autofill').addEventListener('click', () => {
      const placed = placedIds();
      const pool = [...collection].filter((id) => byId.has(id) && !placed.has(id));
      if (!pool.length) return;
      // fill empty slots across pages, adding pages as needed
      let pi = 0, si = 0;
      for (const id of pool) {
        while (true) {
          if (pi >= binder.pages.length) binder.pages.push(Array(9).fill(null));
          if (binder.pages[pi][si] == null) { binder.pages[pi][si] = id; break; }
          si++; if (si >= 9) { si = 0; pi++; }
        }
      }
      save(); pageIdx = 0; renderPage(); renderBank(); pageMeta();
    });

    renderBank(); renderPage(); pageMeta();
  })();
  </script>
</body>
</html>
