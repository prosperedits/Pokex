<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POKEX — Collection</title>
<meta name="description" content="Your POKEX wishlist and collection.">
<link rel="icon" type="image/png" href="assets/pokex-ball-64.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://assets.tcgdex.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand/tokens.css?v=23">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-synthesis: none; }
html { background: var(--stage); }
body {
  min-height: 100vh;
  color: var(--text);
  font-family: var(--font-ui);
  /* soft gold ambience — vault lighting, no harsh texture */
  background:
    radial-gradient(90% 60% at 50% -12%, rgba(249, 201, 64, 0.11) 0%, transparent 60%),
    radial-gradient(70% 80% at 108% 92%, rgba(240, 140, 30, 0.08) 0%, transparent 55%),
    radial-gradient(55% 65% at -8% 78%, rgba(201, 162, 75, 0.07) 0%, transparent 55%),
    #0B0A10;
}
body::after { /* warm gold-leaning vignette */
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(120% 90% at 50% 40%,
    rgba(46, 36, 12, 0.45) 0%, rgba(11, 10, 16, 0) 55%);
  pointer-events: none;
}

.chrome {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--s-3) var(--s-5); min-height: 64px;
}
.logo-pokex { display: inline-flex; line-height: 1; user-select: none; text-decoration: none; }
.logo-pokex .lx {
  font-family: var(--font-logo-x);
  font-size: 50px;
  background: linear-gradient(178deg,
    #EAF7FF 6%, var(--spectral-bright) 28%, var(--spectral) 54%, #1B5E96 78%, #9FE2FF 96%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  filter: drop-shadow(0 0 22px rgba(61, 155, 224, 0.55)) drop-shadow(0 0 48px rgba(127, 212, 244, 0.28));
}
.page-title {
  font-family: var(--font-display);
  font-size: clamp(18px, 2.2vw, 26px);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ember-glint);
  text-shadow: 0 0 22px rgba(249, 201, 64, 0.35);
}
.back {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  border: 1px solid var(--stage-line);
  padding: 8px 16px;
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
  transition: color var(--dur-fast), border-color var(--dur-fast);
}
.back:hover { color: var(--text); border-color: var(--text-faint); }

main { max-width: 1280px; margin: 0 auto; padding: var(--s-4) var(--s-5) var(--s-8); }

.sect { margin-top: var(--s-6); }
.sect-head {
  display: flex; align-items: baseline; gap: var(--s-2);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.sect-head::before {
  content: '';
  align-self: center;
  width: 7px; height: 7px; flex: none;
  clip-path: polygon(0 0, 100% 0, 100% 100%);
}
.sect-head.coll::before { background: var(--ember); }
.sect-head.wish::before { background: var(--phantom); }
.sect-head .n { margin-left: auto; color: var(--text-dim); }
.sect-head .total { color: var(--money); font-weight: 600; }

.grid {
  margin-top: var(--s-4);
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: var(--s-4);
}
.tile {
  display: flex; flex-direction: column; gap: var(--s-2);
  background: linear-gradient(168deg, rgba(16, 14, 24, 0.66), rgba(11, 10, 16, 0.78));
  border: 1px solid var(--stage-line);
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
  padding: var(--s-3);
  text-decoration: none;
  color: var(--text);
  transition: transform var(--dur-fast) var(--ease-snap), border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.tile:hover {
  transform: translateY(-4px);
  border-color: var(--spectral);
  box-shadow: 0 14px 34px rgba(0, 0, 0, 0.55);
}
.tile img {
  width: 100%;
  aspect-ratio: 734 / 1024;
  object-fit: cover;
  border-radius: 6px;
  background: var(--stage-raise) url('assets/card-back-phantasmal.svg') center / cover no-repeat;
}
.tile .nm {
  font-family: var(--font-display);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1.2;
}
.tile .st { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
.tile .pr { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--money); }

.empty {
  margin-top: var(--s-4);
  padding: var(--s-5);
  border: 1px dashed var(--stage-line);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
}
</style>
</head>
<body>
  <header class="chrome">
    <a class="logo-pokex" href="index.html" aria-label="POKEX home"><span class="lx">X</span></a>
    <span class="page-title">Collection</span>
    <a class="back" href="index.html">← back to the wheel</a>
  </header>

  <main>
    <section class="sect">
      <div class="sect-head coll">◆ Collection <span class="n"><span id="collN">0</span> cards · <span class="total" id="collTotal">$0.00</span></span></div>
      <div id="collGrid" class="grid"></div>
      <div id="collEmpty" class="empty" hidden>Nothing collected yet — open a card on the wheel and hit ◇ collection.</div>
    </section>
    <section class="sect">
      <div class="sect-head wish">♥ Wishlist <span class="n"><span id="wishN">0</span> cards · <span class="total" id="wishTotal">$0.00</span></span></div>
      <div id="wishGrid" class="grid"></div>
      <div id="wishEmpty" class="empty" hidden>Wishlist is empty — open a card on the wheel and hit ♡ wishlist.</div>
    </section>
  </main>

  <script src="data/cards-sv01.js"></script>
  <script src="data/cards-sv02.js"></script>
  <script src="data/cards-sv03.js"></script>
  <script src="data/cards-sv03.5.js"></script>
  <script src="data/cards-sv04.js"></script>
  <script src="data/cards-sv04.5.js"></script>
  <script src="data/cards-sv05.js"></script>
  <script src="data/cards-sv06.js"></script>
  <script src="data/cards-sv06.5.js"></script>
  <script src="data/cards-sv07.js"></script>
  <script src="data/cards-sv08.js"></script>
  <script src="data/cards-sv08.5.js"></script>
  <script src="data/cards-sv09.js"></script>
  <script src="data/cards-sv10.js"></script>
  <script src="data/cards-sv10.5b.js"></script>
  <script src="data/cards-sv10.5w.js"></script>
  <script src="data/cards-me01.js"></script>
  <script src="data/cards-me02.js"></script>
  <script src="data/cards-me02.5.js"></script>
  <script src="data/cards-me03.js"></script>
  <script src="data/cards-me04.js"></script>
  <script>
  (() => {
    'use strict';
    const SETS = window.CARD_SETS || {};
    const EUR_USD = 1.10; // keep in sync with app.js
    const safeImg = (url) => (typeof url === 'string' && url.startsWith('https://assets.tcgdex.net/')) ? url : '';
    const usd = (c) => typeof c.priceUsd === 'number' ? c.priceUsd
      : (c.cardmarket?.trend != null ? c.cardmarket.trend * EUR_USD : null);

    // card index by set-qualified id (same ids app.js persists)
    const byId = new Map();
    for (const [sid, set] of Object.entries(SETS)) {
      for (const c of set.cards) byId.set(c.id, { setId: sid, setName: set.set.name, card: c });
    }
    const load = (key) => {
      try { return JSON.parse(localStorage.getItem(key) || '[]'); }
      catch { return []; }
    };

    function render(ids, gridId, emptyId, nId, totalId) {
      const grid = document.getElementById(gridId);
      const entries = ids.map(id => byId.get(id)).filter(Boolean)
        .sort((a, b) => (usd(b.card) ?? -1) - (usd(a.card) ?? -1));
      document.getElementById(nId).textContent = String(entries.length);
      let total = 0;
      for (const { setId, setName, card } of entries) {
        const a = document.createElement('a');
        a.className = 'tile';
        a.href = `app.html?set=${encodeURIComponent(setId)}&card=${card.num}`;
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.alt = card.name;
        img.src = safeImg(card.image + '/low.webp');
        const nm = document.createElement('span');
        nm.className = 'nm';
        nm.textContent = card.name;
        const st = document.createElement('span');
        st.className = 'st';
        st.textContent = `${setName} · ${card.localId}`;
        const pr = document.createElement('span');
        pr.className = 'pr';
        const v = usd(card);
        pr.textContent = v != null ? `$${v.toFixed(2)}` : '—';
        if (v != null) total += v;
        a.append(img, nm, st, pr);
        grid.appendChild(a);
      }
      document.getElementById(totalId).textContent = `$${total.toFixed(2)}`;
      document.getElementById(emptyId).hidden = entries.length > 0;
    }

    render(load('pokex.collection'), 'collGrid', 'collEmpty', 'collN', 'collTotal');
    render(load('pokex.wishlist'), 'wishGrid', 'wishEmpty', 'wishN', 'wishTotal');
  })();
  </script>
</body>
</html>
